<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luminous v1.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #7058c9; --bg: #25272D; --chat-bg: #2E3037; --panel: #1a1b1e; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100dvh; display: flex; overflow: hidden; }
        
        /* Sidebar */
        #sidebar { width: 300px; background: var(--bg); border-right: 1px solid rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        #cl { flex-grow: 1; overflow-y: auto; }
        .chat-item { padding: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .chat-item:active { background: rgba(255,255,255,0.1); }

        /* Main Chat */
        #main-chat { flex-grow: 1; display: flex; flex-direction: column; background: var(--chat-bg); position: relative; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; word-wrap: break-word; position: relative; }
        .msg.mine { align-self: flex-end; background: var(--accent); }
        .msg.theirs { align-self: flex-start; background: var(--panel); }

        /* Call UI */
        #call-overlay {
            position: fixed; inset: 0; background: #141517; z-index: 50000;
            display: none; flex-direction: column; align-items: center; justify-content: space-around; padding: 40px;
        }
        .call-btn { width: 70px; height: 70px; border-radius: 50%; border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-accept { background: #2ecc71; }
        .btn-decline { background: #e74c3c; }
        .btn-mute { background: #565C69; width: 55px; height: 55px; margin-top: 20px; }
        .muted { background: #ff9f43 !important; }

        /* Header & Inputs */
        #chat-header { padding: 15px 20px; background: var(--bg); display: flex; align-items: center; min-height: 65px; }
        #call-icon { font-size: 24px; cursor: pointer; margin-left: auto; display: none; color: #2ecc71; }
        input { background: var(--panel); border: none; color: #fff; padding: 12px; border-radius: 10px; outline: none; }
        #auth-overlay { position: fixed; inset: 0; background: #1E1F23; z-index: 10000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body onclick="unlockAudio()">

    <div id="auth-overlay">
        <div style="background: var(--chat-bg); padding: 35px; border-radius: 24px; text-align: center; width: 320px;">
            <h2 style="color: var(--accent);">Luminous</h2>
            <input type="email" id="ae" placeholder="Email" style="width:100%; margin-bottom:12px;">
            <input type="password" id="ap" placeholder="Пароль" style="width:100%; margin-bottom:20px;">
            <button onclick="auth()" style="width:100%; padding:12px; background:var(--accent); border:none; color:#fff; border-radius:10px; cursor:pointer;">Войти</button>
        </div>
    </div>

    <div id="call-overlay">
        <div style="text-align: center;">
            <div id="ca" style="width:120px; height:120px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:45px; margin:0 auto;">👤</div>
            <h2 id="cn">User</h2>
            <p id="cs">Звонок...</p>
            <button id="mb" class="call-btn btn-mute" onclick="toggleMic()" style="display:none; margin: 20px auto;">🎤</button>
        </div>
        <div style="display: flex; gap: 40px;">
            <button class="call-btn btn-decline" onclick="endCall()">✖</button>
            <button class="call-btn btn-accept" id="ab" onclick="handleAccept()">📞</button>
        </div>
        <audio id="rt" loop src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3"></audio>
        <audio id="remote-audio" autoplay></audio>
    </div>

    <div id="sidebar">
        <div style="padding: 20px; font-weight: bold; color: var(--accent); font-size: 20px;">Luminous</div>
        <input id="si" placeholder="Поиск (Email)..." onkeyup="if(event.key==='Enter') openChat(this.value)" style="margin:0 15px 15px;">
        <div id="cl"></div>
    </div>

    <div id="main-chat">
        <div id="chat-header">
            <div id="ct" style="font-weight:bold;">Выберите чат</div>
            <div id="call-icon" onclick="startCall()">📞</div>
        </div>
        <div id="messages"></div>
        <form id="mf" style="padding:15px; display:flex; gap:10px;" onsubmit="sendMsg(event)">
            <input id="mi" placeholder="Сообщение..." style="flex-grow:1;" autocomplete="off">
            <button style="background:none; border:none; color:var(--accent); font-size:28px; cursor:pointer;">➤</button>
        </form>
    </div>

    <script>
        const _sup = supabase.createClient('https://rlbrnsjluipocxommmvx.supabase.co', 'sb_publishable_p_5nubdUTK9RUqIcosNRlQ_M2wM9VeG');
        
        let myEmail = "", peerEmail = null, callId = null;
        let localStream = null, peerInstance = null, currentCall = null, isMuted = false;

        async function init() {
            const { data: { session } } = await _sup.auth.getSession();
            if (!session) { document.getElementById('auth-overlay').style.display = 'flex'; return; }
            
            myEmail = session.user.email.toLowerCase().trim();
            document.getElementById('auth-overlay').style.display = 'none';

            // НОВОЕ: Проверка/Создание профиля (чтобы не было ошибки Foreign Key)
            const { data: prof } = await _sup.from('user_profiles').select('email').eq('email', myEmail).single();
            if (!prof) await _sup.from('user_profiles').insert([{ email: myEmail, display_name: myEmail.split('@')[0] }]);

            // PeerJS Setup
            const safeId = myEmail.replace(/[^a-zA-Z0-9]/g, "");
            peerInstance = new Peer(safeId);
            
            peerInstance.on('call', async (incoming) => {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                incoming.answer(localStream);
                setupVoice(incoming);
            });

            // Realtime: Сообщения
            _sup.channel('m').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
                const m = p.new;
                if (m.receiver_email === myEmail || m.author_email === myEmail) {
                    if (peerEmail === m.author_email || peerEmail === m.receiver_email) render(m);
                    loadList();
                }
            }).subscribe();

            // Realtime: Звонки
            _sup.channel('c').on('postgres_changes', { event: '*', schema: 'public', table: 'calls' }, p => {
                const c = p.new;
                if (p.eventType === 'INSERT' && c.receiver_email === myEmail) {
                    callId = c.id;
                    showCallUI(c.caller_email, 'in');
                }
                if (p.eventType === 'UPDATE' && c.id === callId) {
                    if (c.status === 'active') connectVoice();
                    if (c.status === 'ended' || c.status === 'rejected') hideCallUI();
                }
            }).subscribe();

            loadList();
        }

        // --- ЛОГИКА ЗВОНКА ---
        async function connectVoice() {
            document.getElementById('cs').innerText = "В эфире";
            document.getElementById('rt').pause();
            document.getElementById('mb').style.display = 'block';
            
            if (document.getElementById('ab').style.display === 'none' && !currentCall) {
                const targetId = peerEmail.replace(/[^a-zA-Z0-9]/g, "");
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const call = peerInstance.call(targetId, localStream);
                setupVoice(call);
            }
        }

        function setupVoice(call) {
            currentCall = call;
            call.on('stream', (remoteStream) => {
                const audio = document.getElementById('remote-audio');
                audio.srcObject = remoteStream;
                audio.play().catch(() => {});
            });
        }

        async function handleAccept() {
            await _sup.from('calls').update({ status: 'active' }).eq('id', callId);
            document.getElementById('ab').style.display = 'none';
        }

        async function startCall() {
            const { data } = await _sup.from('calls').insert([{
                caller_email: myEmail, receiver_email: peerEmail, status: 'ringing', type: 'audio'
            }]).select().single();
            callId = data.id;
            showCallUI(peerEmail, 'out');
        }

        function toggleMic() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            const btn = document.getElementById('mb');
            btn.innerText = isMuted ? "🔇" : "🎤";
            btn.classList.toggle('muted', isMuted);
        }

        function showCallUI(e, type) {
            document.getElementById('cn').innerText = e.split('@')[0];
            document.getElementById('call-overlay').style.display = 'flex';
            if (type === 'in') {
                document.getElementById('ab').style.display = 'flex';
                document.getElementById('rt').play().catch(()=>{});
            } else {
                document.getElementById('ab').style.display = 'none';
            }
        }

        function hideCallUI() {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (currentCall) currentCall.close();
            document.getElementById('call-overlay').style.display = 'none';
            document.getElementById('rt').pause();
            callId = null; isMuted = false; localStream = null; currentCall = null;
        }

        function unlockAudio() {
            const r = document.getElementById('rt');
            r.play().then(() => { r.pause(); r.currentTime = 0; }).catch(()=>{});
        }

        // --- ЛОГИКА ЧАТА ---
        async function openChat(e) {
            peerEmail = e.toLowerCase().trim();
            document.getElementById('ct').innerText = peerEmail.split('@')[0];
            document.getElementById('call-icon').style.display = 'block';
            const { data } = await _sup.from('messages').select('*').or(`and(author_email.eq.${myEmail},receiver_email.eq.${peerEmail}),and(author_email.eq.${peerEmail},receiver_email.eq.${myEmail})`).order('created_at');
            document.getElementById('messages').innerHTML = "";
            if (data) data.forEach(render);
        }

        async function loadList() {
            const { data } = await _sup.from('messages').select('author_email, receiver_email').or(`author_email.eq.${myEmail},receiver_email.eq.${myEmail}`);
            if (!data) return;
            const peers = [...new Set(data.map(m => m.author_email === myEmail ? m.receiver_email : m.author_email))];
            const list = document.getElementById('cl'); list.innerHTML = "";
            peers.forEach(p => {
                const d = document.createElement('div'); d.className = "chat-item";
                d.innerHTML = `<strong>${p.split('@')[0]}</strong><br><small style="opacity:0.5">${p}</small>`;
                d.onclick = () => openChat(p);
                list.appendChild(d);
            });
        }

        function render(m) {
            const d = document.createElement('div');
            d.className = `msg ${m.author_email === myEmail ? 'mine' : 'theirs'}`;
            d.innerText = m.text;
            document.getElementById('messages').appendChild(d);
            const b = document.getElementById('messages'); b.scrollTop = b.scrollHeight;
        }

        async function sendMsg(e) {
            e.preventDefault(); const t = document.getElementById('mi').value;
            if (!t || !peerEmail) return; document.getElementById('mi').value = "";
            await _sup.from('messages').insert([{ text: t, author_email: myEmail, receiver_email: peerEmail }]);
        }

        async function auth() {
            const e = document.getElementById('ae').value; const p = document.getElementById('ap').value;
            const { error } = await _sup.auth.signInWithPassword({email:e, password:p});
            if (error) alert(error.message); else location.reload();
        }

        async function endCall() {
            if (callId) await _sup.from('calls').update({ status: 'ended', ended_at: new Date() }).eq('id', callId);
            hideCallUI();
        }

        init();
    </script>
</body>
</html>
