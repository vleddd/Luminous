<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luminous v0.7.5 - Edit & Delete Update</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #25272D; color: #fff; height: 100dvh; display: flex; overflow: hidden; }

        /* ЭФФЕКТ РАЗМЫТИЯ */
        #mobile-blur-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 999; display: none; opacity: 0; transition: opacity 0.3s;
        }

        /* КОНТЕКСТНОЕ МЕНЮ */
        .context-menu {
            position: fixed; background: #2E3037; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; width: 180px; z-index: 1000; display: none; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .context-item {
            padding: 12px 16px; font-size: 14px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: space-between;
        }
        .context-item:hover { background: #3D3F46; }
        .context-item.del-type { color: #ff4d4d; }

        /* ОКНО РЕГИСТРАЦИИ */
        #auth-overlay { position: fixed; inset: 0; background: #1E1F23; z-index: 10000; display: none; align-items: center; justify-content: center; }
        .auth-card { background: #2E3037; padding: 35px; border-radius: 24px; width: 340px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; border: none; background: #23242A; color: #fff; outline: none; font-size: 16px; }
        .auth-btn { width: 100%; padding: 12px; background: #7058c9; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .auth-secondary { background: transparent; color: #6EBDFD; border: 1px solid #6EBDFD; }

        /* МОДАЛКА УДАЛЕНИЯ СООБЩЕНИЯ */
        #msg-delete-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .msg-delete-card { background: #2E3037; padding: 25px; border-radius: 24px; width: 100%; max-width: 320px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }

        /* ОСТАЛЬНЫЕ МОДАЛКИ И СТИЛИ ИЗ ВАШЕГО СКРИПТА */
        #delete-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .delete-card { background: #2E3037; padding: 25px; border-radius: 24px; width: 100%; max-width: 340px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .del-btn-red { width: 100%; padding: 12px; background: #ff4d4d; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .del-btn-gray { width: 100%; padding: 12px; background: #3D3F46; color: white; border: none; border-radius: 12px; cursor: pointer; margin-bottom: 10px; }

        #photo-modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 30000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #2E3037; border-radius: 24px; width: 100%; max-width: 450px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); }
        .modal-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .modal-body { padding: 15px; background: #1a1b1e; max-height: 60vh; overflow-y: auto; display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }
        .preview-item { position: relative; aspect-ratio: 1 / 1; border-radius: 12px; overflow: hidden; background: #23242A; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
        .preview-item img, .preview-item video { width: 100%; height: 100%; object-fit: cover; }
        .file-icon-label { font-size: 11px; text-align: center; word-break: break-all; padding: 5px; color: #BAC1F3; }
        .modal-footer { padding: 15px 20px; background: #2E3037; display: flex; gap: 12px; align-items: center; }
        #modal-caption { background: #23242A; border: none; color: #fff; outline: none; flex-grow: 1; font-size: 16px; padding: 10px 15px; border-radius: 12px; }
        .modal-send-btn { background: #7058c9; color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }

        #full-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 50000; display: none; align-items: center; justify-content: center; padding: 10px; }
        #viewer-content { max-width: 100%; max-height: 100%; position: relative; }
        #viewer-content img, #viewer-content video { max-width: 100%; max-height: 95vh; border-radius: 8px; }

        #sidebar { width: 300px; background: #25272D; border-right: 1px solid rgba(0,0,0,0.2); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 10px; background: #252935; display: flex; align-items: center; gap: 10px; border-radius: 10px; margin: 5px; }
        #search-input { background: #33353B; border: none; border-radius: 40px; color: #fff; outline: none; padding: 8px 15px; flex-grow: 1; font-size: 14px; }
        #chat-list { overflow-y: auto; flex-grow: 1; padding: 10px; }
        .chat-item { background: transparent; border-radius: 15px; margin-bottom: 8px; padding: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; user-select: none; }
        .chat-item.active { background: #34373F !important; border: 1px solid #565C69; }

        #main-chat { flex-grow: 1; display: flex; flex-direction: column; background: #2E3037; position: relative; }
        #chat-header { padding: 10px 20px; background: #25272D; display: flex; align-items: center; gap: 12px; height: 60px; margin: 5px; border-radius: 10px; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .date-divider { align-self: center; background: rgba(0,0,0,0.2); color: #BAC1F3; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin: 15px 0; font-weight: 500; opacity: 0.8; }

        .msg { width: fit-content; min-width: 80px; max-width: 85%; padding: 10px 14px; font-size: 15px; word-wrap: break-word; display: flex; flex-direction: column; position: relative; transition: transform 0.2s; }
        .msg.active-context { z-index: 1001; }
        .msg-info { font-size: 10px; opacity: 0.5; margin-top: 4px; align-self: flex-end; display: flex; gap: 4px; }
        .msg-theirs { align-self: flex-start; background: #191a1d; border-radius: 18px 18px 18px 4px; }
        .msg-mine { align-self: flex-end; background: #7058c9; border-radius: 18px 18px 4px 18px; }
        .edited-mark { font-size: 9px; opacity: 0.6; margin-right: 2px; }

        .photo-grid { display: grid; gap: 4px; margin-bottom: 6px; border-radius: 12px; overflow: hidden; width: 100%; max-width: 320px; }
        .photo-grid img, .photo-grid video { width: 100%; height: 160px; object-fit: cover; cursor: pointer; display: block; background: rgba(0,0,0,0.1); }
        .grid-1 img, .grid-1 video { height: auto; max-height: 300px; object-fit: contain; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr; }
        .grid-3 *:first-child { grid-column: span 2; height: 180px; }
        .grid-4 { grid-template-columns: 1fr 1fr; }

        .input-area { padding: 10px 20px; display: flex; align-items: center; gap: 12px; background: #2E3037; }
        .input-wrapper { background: #23242A; flex-grow: 1; border-radius: 15px; padding: 12px 15px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
        #input { background: none; border: none; color: #fff; outline: none; flex-grow: 1; font-size: 16px; }
        .send-btn { color: #6EBDFD; font-size: 28px; cursor: pointer; background: none; border: none; display: flex; align-items: center; transition: 0.2s; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #E0E2E5; color: #444; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; text-transform: uppercase; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; height: 100%; z-index: 10; }
            #main-chat { width: 100%; position: absolute; height: 100%; z-index: 20; transform: translateX(100%); transition: 0.25s ease; }
            body.chat-open #main-chat { transform: translateX(0); }
            .input-area { padding: 10px; }
            #back-mobile { display: block !important; }
        }
    </style>
</head>
<body>

    <div id="mobile-blur-overlay" onclick="closeContextMenu()"></div>

    <div id="context-menu" class="context-menu">
        <div class="context-item" onclick="copyMsg()">Копировать <span>📋</span></div>
        <div id="ctx-edit" class="context-item" onclick="startEdit()">Изменить <span>✏️</span></div>
        <div class="context-item del-type" onclick="openMsgDeleteModal()">Удалить <span>🗑️</span></div>
    </div>

    <div id="msg-delete-modal">
        <div class="msg-delete-card">
            <h3 style="margin-top:0; color:#fff;">Удалить сообщение?</h3>
            <button id="msg-del-me" class="del-btn-gray">Удалить у меня</button>
            <button id="msg-del-both" class="del-btn-red">Удалить у всех</button>
            <button onclick="closeMsgDeleteModal()" style="background:none; border:none; color:#8E94A5; cursor:pointer; width:100%; padding:10px;">Отмена</button>
        </div>
    </div>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color: #BAC1F3; margin-bottom: 20px;">Luminous</h2>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button onclick="handleAuth('login')" class="auth-btn">Войти</button>
            <button onclick="handleAuth('register')" class="auth-btn auth-secondary">Регистрация</button>
            <p id="auth-error" style="color: #ff5e5e; font-size: 12px; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div id="photo-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span style="font-weight: bold;">Отправить файлы</span>
                <span onclick="cancelFile()" style="cursor: pointer; font-size: 24px;">×</span>
            </div>
            <div class="modal-body" id="modal-preview-container"></div>
            <div class="modal-footer">
                <input id="modal-caption" placeholder="Добавьте подпись..." autocomplete="off">
                <button class="modal-send-btn" id="modal-send-btn">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <div id="full-viewer" onclick="this.style.display='none'">
        <div id="viewer-content"></div>
        <span style="position:absolute; top:20px; right:30px; font-size:40px; cursor:pointer;">×</span>
    </div>

    <div id="delete-modal" onclick="closeDeleteModal()">
        <div class="delete-card" onclick="event.stopPropagation()">
            <h3 style="margin-top: 0; color: #fff;">Удалить чат?</h3>
            <p id="delete-info" style="color: #8E94A5; font-size: 14px; margin-bottom: 20px;"></p>
            <button id="del-only-me" class="del-btn-gray">Удалить только у меня</button>
            <button id="del-both" class="del-btn-red">Удалить у обоих</button>
            <button onclick="closeDeleteModal()" style="background:none; border:none; color:#8E94A5; cursor:pointer; width:100%; padding:10px;">Отмена</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <div class="menu-btn" style="cursor:pointer; opacity:0.6;">☰</div>
            <input id="search-input" placeholder="Search" onkeyup="if(event.key==='Enter') openChat(this.value)">
            <div style="color: #BAC1F3; font-weight: bold; font-size: 14px; margin-left: auto;">Luminous</div>
        </div>
        <div id="chat-list"></div>
    </div>

    <div id="main-chat">
        <div id="chat-header">
            <div onclick="goBack()" style="cursor:pointer; font-size:24px; display:none; padding-right:10px;" id="back-mobile">‹</div>
            <div class="avatar" id="header-av">?</div>
            <div id="chat-title" style="font-weight:600;">Выберите собеседника</div>
            <div onclick="logout()" style="margin-left: auto; cursor: pointer; opacity: 0.5; font-size: 12px;">Выйти</div>
        </div>
        <div id="messages"></div>
        <form class="input-area" id="msg-form">
            <div class="input-wrapper">
                <div style="font-size: 20px; cursor: pointer; opacity: 0.7;">😊</div>
                <input id="input" placeholder="Message" autocomplete="off">
                <label for="file-input" style="font-size: 20px; cursor: pointer; transform: rotate(45deg); opacity: 0.7;">📎</label>
                <input type="file" id="file-input" style="display:none" multiple>
            </div>
            <button type="submit" class="send-btn">➤</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _sup = supabase.createClient('https://rlbrnsjluipocxommmvx.supabase.co', 'sb_publishable_p_5nubdUTK9RUqIcosNRlQ_M2wM9VeG');

        let myEmail = "", currentPeer = null, profileCache = {}, lastRenderedDate = null, chatToDelete = null, pressTimer = null;
        let selectedMsg = null, editMode = false, editingId = null;

        const fileInput = document.getElementById('file-input');
        const photoModal = document.getElementById('photo-modal');
        const modalCaption = document.getElementById('modal-caption');
        const previewContainer = document.getElementById('modal-preview-container');

        async function init() {
            const { data: { session } } = await _sup.auth.getSession();
            if (session) {
                myEmail = session.user.email.toLowerCase().trim();
                document.getElementById('auth-overlay').style.display = 'none';
                
                _sup.channel('messages-realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, payload => {
                        const m = payload.new || payload.old;
                        if (payload.eventType === 'DELETE') {
                            document.getElementById(`msg-${m.id}`)?.remove();
                        } else if (payload.eventType === 'UPDATE') {
                            const el = document.getElementById(`msg-${m.id}`);
                            if (el) {
                                if (m.is_deleted_for_all) el.remove();
                                else {
                                    const textDiv = el.querySelector('.msg-text');
                                    if (textDiv) textDiv.innerText = m.text;
                                    if (m.is_edited && !el.querySelector('.edited-mark')) {
                                        el.querySelector('.msg-info').insertAdjacentHTML('afterbegin', '<span class="edited-mark">(изм.)</span>');
                                    }
                                }
                            }
                        } else if (payload.eventType === 'INSERT') {
                            if ((m.author_email === myEmail && m.receiver_email === currentPeer) || 
                                (m.author_email === currentPeer && m.receiver_email === myEmail)) {
                                render(m);
                            }
                            loadHistory();
                        }
                    }).subscribe();

                loadHistory(); 
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
            }
        }

        /* ЛОГИКА КОНТЕКСТНОГО МЕНЮ */
        function openContextMenu(e, msgData) {
            e.preventDefault();
            selectedMsg = msgData;
            const menu = document.getElementById('context-menu');
            const overlay = document.getElementById('mobile-blur-overlay');
            const isMobile = window.innerWidth <= 768;

            // Скрываем "Изменить" если сообщение не наше
            document.getElementById('ctx-edit').style.display = msgData.author_email === myEmail ? 'flex' : 'none';

            if (isMobile) {
                overlay.style.display = 'block';
                setTimeout(() => overlay.style.opacity = '1', 10);
                const msgEl = document.getElementById(`msg-${msgData.id}`);
                msgEl.classList.add('active-context');
                
                const rect = msgEl.getBoundingClientRect();
                menu.style.top = (rect.bottom + 10) + 'px';
                menu.style.left = '50%';
                menu.style.transform = 'translateX(-50%)';
            } else {
                menu.style.top = e.clientY + 'px';
                menu.style.left = e.clientX + 'px';
                menu.style.transform = 'none';
            }
            menu.style.display = 'block';
        }

        function closeContextMenu() {
            document.getElementById('context-menu').style.display = 'none';
            const overlay = document.getElementById('mobile-blur-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 300);
            document.querySelectorAll('.msg').forEach(m => m.classList.remove('active-context'));
        }

        window.onclick = () => closeContextMenu();

        function copyMsg() {
            if (selectedMsg?.text) navigator.clipboard.writeText(selectedMsg.text);
            closeContextMenu();
        }

        function startEdit() {
            if (!selectedMsg) return;
            editMode = true;
            editingId = selectedMsg.id;
            const input = document.getElementById('input');
            input.value = selectedMsg.text;
            input.focus();
            closeContextMenu();
        }

        function openMsgDeleteModal() {
            document.getElementById('msg-delete-modal').style.display = 'flex';
            document.getElementById('msg-del-both').style.display = selectedMsg.author_email === myEmail ? 'block' : 'none';
            
            document.getElementById('msg-del-me').onclick = () => confirmDeleteMsg(false);
            document.getElementById('msg-del-both').onclick = () => confirmDeleteMsg(true);
        }

        function closeMsgDeleteModal() {
            document.getElementById('msg-delete-modal').style.display = 'none';
            closeContextMenu();
        }

        async function confirmDeleteMsg(forAll) {
            if (!selectedMsg) return;
            if (forAll) {
                await _sup.from('messages').update({ is_deleted_for_all: true }).eq('id', selectedMsg.id);
            } else {
                await _sup.from('messages').delete().eq('id', selectedMsg.id);
            }
            closeMsgDeleteModal();
        }

        /* СТАРЫЕ МЕХАНИКИ БЕЗ ИЗМЕНЕНИЙ */
        fileInput.onchange = () => {
            const files = fileInput.files;
            if (files.length === 0) return;
            previewContainer.innerHTML = "";
            Array.from(files).forEach(file => {
                const url = URL.createObjectURL(file);
                const item = document.createElement('div');
                item.className = "preview-item";
                if (file.type.startsWith('image/')) item.innerHTML = `<img src="${url}">`;
                else if (file.type.startsWith('video/')) item.innerHTML = `<video src="${url}"></video>`;
                else {
                    const ext = file.name.split('.').pop().toUpperCase();
                    item.innerHTML = `<div class="file-icon-label">📄<br>${ext}<br>${file.name.substring(0,10)}...</div>`;
                }
                previewContainer.appendChild(item);
            });
            photoModal.style.display = 'flex';
        };

        function cancelFile() { fileInput.value = ""; modalCaption.value = ""; photoModal.style.display = 'none'; }

        async function sendWithFile() {
            const files = fileInput.files;
            const text = modalCaption.value.trim();
            if (files.length === 0 || !currentPeer) return;
            const btn = document.getElementById('modal-send-btn');
            btn.innerText = "ЗАГРУЗКА..."; btn.disabled = true;
            try {
                let uploadedUrls = [];
                for (let file of files) {
                    const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 5)}.${file.name.split('.').pop()}`;
                    const { error: uploadError } = await _sup.storage.from('uploads').upload(fileName, file);
                    if (uploadError) throw uploadError;
                    const { data: { publicUrl } } = _sup.storage.from('uploads').getPublicUrl(fileName);
                    uploadedUrls.push(publicUrl);
                }
                await _sup.from('messages').insert([{ text: text || null, author_email: myEmail, receiver_email: currentPeer, file_url: uploadedUrls }]);
                cancelFile();
            } catch (err) { alert("Ошибка: " + err.message); } 
            finally { btn.innerText = "ОТПРАВИТЬ"; btn.disabled = false; }
        }

        document.getElementById('modal-send-btn').onclick = sendWithFile;

        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-pass').value;
            let res = type === 'register' ? await _sup.auth.signUp({ email, password }) : await _sup.auth.signInWithPassword({ email, password });
            if (res.error) {
                const errorEl = document.getElementById('auth-error');
                errorEl.innerText = res.error.message; errorEl.style.display = 'block';
            } else location.reload();
        }

        async function logout() { await _sup.auth.signOut(); location.reload(); }

        function openFullView(url, isVideo) {
            const viewer = document.getElementById('full-viewer');
            const content = document.getElementById('viewer-content');
            content.innerHTML = isVideo ? `<video src="${url}" controls autoplay></video>` : `<img src="${url}">`;
            viewer.style.display = 'flex';
        }

        async function openChat(email) {
            if (!email) return;
            email = email.toLowerCase().trim();
            currentPeer = email; lastRenderedDate = null;
            document.body.classList.add('chat-open');
            const name = await getProfileName(email);
            document.getElementById('chat-title').innerText = name;
            document.getElementById('header-av').innerText = name[0];
            const msgContainer = document.getElementById('messages');
            msgContainer.innerHTML = "";
            const { data } = await _sup.from('messages').select('*')
                .or(`and(author_email.eq.${myEmail},receiver_email.eq.${currentPeer}),and(author_email.eq.${currentPeer},receiver_email.eq.${myEmail})`)
                .eq('is_deleted_for_all', false).order('created_at', { ascending: true });
            if (data) data.forEach(render);
            updateChatListUI();
        }

        async function loadHistory() {
            const { data: msgs } = await _sup.from('messages').select('author_email, receiver_email, created_at')
                .or(`author_email.eq.${myEmail},receiver_email.eq.${myEmail}`).order('created_at', {ascending: false});
            if (!msgs) return;
            const hidden = JSON.parse(localStorage.getItem('hidden_chats') || "[]");
            const emails = [...new Set(msgs.map(m => m.author_email.toLowerCase() === myEmail ? m.receiver_email.toLowerCase() : m.author_email.toLowerCase()))]
                            .filter(e => !hidden.includes(e));
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            for (const email of emails) {
                const name = await getProfileName(email);
                const item = document.createElement('div');
                item.className = `chat-item ${currentPeer === email ? 'active' : ''}`;
                item.innerHTML = `<div class="avatar">${name[0]}</div><div style="font-weight:600; font-size:14px;">${name}</div>`;
                item.onclick = () => openChat(email);
                item.oncontextmenu = (e) => { e.preventDefault(); openDeleteMenu(email); };
                item.ontouchstart = () => pressTimer = setTimeout(() => openDeleteMenu(email), 600);
                item.ontouchend = () => clearTimeout(pressTimer);
                list.appendChild(item);
            }
        }

        function render(m) {
            if (m.is_deleted_for_all) return;
            const date = new Date(m.created_at).toLocaleDateString();
            if (lastRenderedDate !== date) {
                lastRenderedDate = date;
                const div = document.createElement('div');
                div.className = 'date-divider';
                div.innerText = date === new Date().toLocaleDateString() ? "Сегодня" : date;
                document.getElementById('messages').appendChild(div);
            }

            const isMine = m.author_email.toLowerCase() === myEmail;
            const div = document.createElement('div');
            div.className = `msg ${isMine ? 'msg-mine' : 'msg-theirs'}`;
            div.id = `msg-${m.id}`;

            // Обработка кликов для меню
            div.oncontextmenu = (e) => openContextMenu(e, m);
            div.ontouchstart = (e) => pressTimer = setTimeout(() => openContextMenu(e, m), 600);
            div.ontouchend = () => clearTimeout(pressTimer);
            
            let fHtml = "";
            if (m.file_url) {
                const urls = Array.isArray(m.file_url) ? m.file_url : [m.file_url];
                fHtml = `<div class="photo-grid grid-${Math.min(urls.length, 4)}">`;
                urls.forEach(url => {
                    const clean = String(url).replace(/[{}"]/g, "").trim();
                    if (clean.match(/\.(mp4|webm|mov)/i)) fHtml += `<video src="${clean}" onclick="event.stopPropagation(); openFullView('${clean}', true)" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>`;
                    else if (clean.match(/\.(jpg|jpeg|png|gif|webp)/i)) fHtml += `<img src="${clean}" onclick="openFullView('${clean}', false)">`;
                    else fHtml += `<div onclick="window.open('${clean}', '_blank')" style="background:#23242A; padding:10px; border-radius:10px; font-size:10px; text-align:center;">📁<br>Файл</div>`;
                });
                fHtml += `</div>`;
            }

            const time = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            div.innerHTML = `
                ${fHtml}
                <div class="msg-text" style="white-space: pre-wrap;">${m.text || ''}</div>
                <div class="msg-info">
                    ${m.is_edited ? '<span class="edited-mark">(изм.)</span>' : ''}
                    <span>${time}</span> 
                    <span style="font-weight:bold; color:#58BFFF;">${isMine ? (m.is_read ? '✓✓' : '✓') : ''}</span>
                </div>`;
                
            const msgBox = document.getElementById('messages');
            msgBox.appendChild(div);
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        document.getElementById('msg-form').onsubmit = async (e) => {
            e.preventDefault();
            const i = document.getElementById('input');
            const text = i.value.trim();
            if (!text || !currentPeer) return;

            if (editMode) {
                await _sup.from('messages').update({ text: text, is_edited: true }).eq('id', editingId);
                editMode = false; editingId = null;
            } else {
                await _sup.from('messages').insert([{ text: text, author_email: myEmail, receiver_email: currentPeer }]);
            }
            i.value = "";
        };

        async function getProfileName(email) {
            if (profileCache[email]) return profileCache[email];
            const { data } = await _sup.from('user_profiles').select('display_name').eq('email', email).maybeSingle();
            const name = data?.display_name || email.split('@')[0];
            profileCache[email] = name; return name;
        }

        function updateChatListUI() {
            document.querySelectorAll('.chat-item').forEach(el => {
                const email = el.querySelector('div:last-child').innerText; // Упрощенно
                el.classList.toggle('active', currentPeer && email.includes(currentPeer.split('@')[0]));
            });
        }

        function goBack() { document.body.classList.remove('chat-open'); currentPeer = null; }
        
        init();
    </script>
</body>
</html>
