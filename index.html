<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luminous Interface v0.8</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #25272D; color: #fff; height: 100dvh; display: flex; overflow: hidden; }

        /* --- UI ЭЛЕМЕНТЫ И МОДАЛКИ --- */
        #auth-overlay { position: fixed; inset: 0; background: #1E1F23; z-index: 10000; display: none; align-items: center; justify-content: center; }
        .auth-card { background: #2E3037; padding: 35px; border-radius: 24px; width: 340px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; border: none; background: #23242A; color: #fff; outline: none; font-size: 16px; }
        .auth-btn { width: 100%; padding: 12px; background: #7058c9; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .auth-secondary { background: transparent; color: #6EBDFD; border: 1px solid #6EBDFD; }

        #delete-modal, #view-user-modal, #photo-modal, #crop-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .delete-card, .user-info-card, .modal-content { background: #2E3037; padding: 25px; border-radius: 24px; width: 100%; max-width: 380px; border: 1px solid rgba(255,255,255,0.1); }

        /* CROP INTERFACE */
        .crop-container { width: 280px; height: 280px; border-radius: 50%; border: 2px solid #7058c9; overflow: hidden; position: relative; margin: 0 auto 20px; background: #1a1b1e; }
        #crop-image { position: absolute; cursor: move; user-select: none; transition: transform 0.1s ease-out; transform-origin: center; }
        .crop-controls { width: 100%; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .crop-slider { width: 100%; -webkit-appearance: none; background: #444; height: 4px; border-radius: 2px; }
        .crop-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #7058c9; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }

        /* --- ПРОФИЛЬ --- */
        #profile-overlay { position: fixed; inset: 0; background: #1E1F23; z-index: 15000; display: none; flex-direction: column; }
        .profile-header { padding: 15px 20px; display: flex; align-items: center; gap: 15px; background: #25272D; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .profile-body { padding: 20px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .profile-avatar-big { width: 110px; height: 110px; border-radius: 50%; background: #7058c9; display: flex; align-items: center; justify-content: center; font-size: 40px; position: relative; overflow: hidden; cursor: pointer; }
        .profile-avatar-big img { width: 100%; height: 100%; object-fit: cover; }
        .profile-section { width: 100%; max-width: 400px; background: #2E3037; border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .profile-label { font-size: 11px; color: #6EBDFD; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .profile-input { background: transparent; border: none; color: #fff; width: 100%; font-size: 16px; outline: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 5px 0; margin-bottom: 15px; }

        /* --- ОСНОВНОЙ ИНТЕРФЕЙС --- */
        #sidebar { width: 320px; background: #25272D; border-right: 1px solid rgba(0,0,0,0.2); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 12px; display: flex; align-items: center; gap: 10px; }
        #search-input { background: #33353B; border: none; border-radius: 12px; color: #fff; outline: none; padding: 10px 15px; flex-grow: 1; font-size: 14px; }
        #chat-list { overflow-y: auto; flex-grow: 1; padding: 5px 10px; }

        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 16px; cursor: pointer; transition: 0.2s; margin-bottom: 4px; }
        .chat-item:hover { background: rgba(255,255,255,0.03); }
        .chat-item.active { background: #34373F; border: 1px solid rgba(255,255,255,0.05); }

        #main-chat { flex-grow: 1; display: flex; flex-direction: column; background: #2E3037; position: relative; }
        #chat-header { padding: 10px 20px; background: #25272D; display: flex; align-items: center; gap: 12px; height: 64px; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }

        .date-divider { align-self: center; background: rgba(0,0,0,0.2); color: #BAC1F3; padding: 4px 12px; border-radius: 20px; font-size: 11px; margin: 15px 0; }

        .msg { width: fit-content; max-width: 80%; padding: 10px 14px; font-size: 15px; margin-bottom: 4px; position: relative; }
        .msg-theirs { align-self: flex-start; background: #191a1d; border-radius: 18px 18px 18px 4px; }
        .msg-mine { align-self: flex-end; background: #7058c9; border-radius: 18px 18px 4px 18px; }
        .msg-info { font-size: 10px; opacity: 0.5; margin-top: 4px; text-align: right; display: flex; justify-content: flex-end; gap: 3px; }

        .photo-grid { display: grid; gap: 5px; margin-bottom: 5px; border-radius: 10px; overflow: hidden; }
        .photo-grid img { width: 100%; max-height: 250px; object-fit: cover; cursor: pointer; }

        .input-area { padding: 15px 20px; display: flex; align-items: center; gap: 12px; background: #2E3037; }
        .input-wrapper { background: #23242A; flex-grow: 1; border-radius: 14px; padding: 10px 15px; display: flex; align-items: center; gap: 12px; }
        #input { background: none; border: none; color: #fff; outline: none; flex-grow: 1; font-size: 16px; }
        .send-btn { color: #6EBDFD; font-size: 24px; cursor: pointer; background: none; border: none; }

        .avatar { width: 42px; height: 42px; border-radius: 50%; background: #7058c9; display: flex; align-items: center; justify-content: center; font-weight: bold; overflow: hidden; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        #full-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 50000; display: none; align-items: center; justify-content: center; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; height: 100%; z-index: 10; }
            #main-chat { width: 100%; position: absolute; height: 100%; z-index: 20; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
            body.chat-open #main-chat { transform: translateX(0); }
            #back-mobile { display: block !important; }
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color: #BAC1F3; margin-bottom: 20px;">Luminous Interface</h2>
            <input type="email" id="auth-email" class="auth-input" placeholder="Электронная почта">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button onclick="handleAuth('login')" class="auth-btn">Войти</button>
            <button onclick="handleAuth('register')" class="auth-btn auth-secondary">Регистрация</button>
            <p id="auth-error" style="color: #ff5e5e; font-size: 12px; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div id="crop-modal">
        <div class="modal-content" style="text-align: center;">
            <h3 style="margin-top:0">Редактор фото</h3>
            <div class="crop-container">
                <img id="crop-image" src="">
            </div>
            <div class="crop-controls">
                <input type="range" id="zoom-slider" class="crop-slider" min="1" max="3" step="0.01" value="1">
                <div style="display: flex; gap: 10px; width: 100%;">
                    <button onclick="closeCrop()" style="flex:1; padding:12px; border-radius:12px; border:none; background:#444; color:#fff;">Отмена</button>
                    <button onclick="applyCrop()" style="flex:1; padding:12px; border-radius:12px; border:none; background:#7058c9; color:#fff; font-weight:bold;">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <div id="photo-modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <b>Отправка файлов</b>
                <span onclick="cancelFile()" style="cursor:pointer">✕</span>
            </div>
            <div id="modal-preview-container" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-bottom:15px;"></div>
            <input id="modal-caption" placeholder="Добавить подпись..." class="auth-input" style="background:#1a1b1e; margin-bottom:15px;">
            <button id="modal-send-btn" class="auth-btn">Отправить</button>
        </div>
    </div>

    <div id="profile-overlay">
        <div class="profile-header">
            <span onclick="toggleProfile(false)" style="cursor:pointer; font-size:20px;">✕</span>
            <span style="font-weight:600">Настройки профиля</span>
            <button onclick="saveProfile()" style="margin-left:auto; background:none; border:none; color:#6EBDFD; font-weight:600; cursor:pointer;">Готово</button>
        </div>
        <div class="profile-body">
            <div class="profile-avatar-big">
                <span id="profile-av-letter">?</span>
                <img id="profile-av-img" style="display:none">
                <label for="av-upload" style="position:absolute; inset:0; background:rgba(0,0,0,0.3); display:flex; align-items:center; justify-content:center; opacity:0; transition:0.2s; cursor:pointer;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0">📷</label>
                <input type="file" id="av-upload" style="display:none" accept="image/*" onchange="initCrop(this)">
            </div>
            <div class="profile-section">
                <div class="profile-label">Имя</div>
                <input id="p-first-name" class="profile-input" placeholder="Ваше имя">
                <div class="profile-label">Фамилия</div>
                <input id="p-last-name" class="profile-input" placeholder="Ваша фамилия">
            </div>
            <div class="profile-section">
                <div class="profile-label">Имя пользователя</div>
                <input id="p-username" class="profile-input" placeholder="@username">
                <div class="profile-label">О себе</div>
                <input id="p-bio" class="profile-input" placeholder="Расскажите о себе">
            </div>
            <button onclick="logout()" style="color:#ff4d4d; background:none; border:1px solid #ff4d4d; padding:12px 30px; border-radius:12px; cursor:pointer; font-weight:bold; margin-top:20px;">Выйти из системы</button>
        </div>
    </div>

    <div id="view-user-modal" onclick="closeUserModal()">
        <div class="user-info-card" onclick="event.stopPropagation()">
            <div style="text-align:center; padding-bottom:20px;">
                <div class="avatar" id="v-avatar" style="width:100px; height:100px; font-size:40px; margin: 0 auto 15px;">?</div>
                <h2 id="v-name" style="margin:0">User Name</h2>
                <div id="v-status-sub" style="font-size:13px; color:#8E94A5; margin-top:5px;">был(а) недавно</div>
            </div>
            <div style="display:flex; flex-direction:column; gap:15px; border-top:1px solid rgba(255,255,255,0.05); padding-top:20px;">
                <div><small style="color:#6EBDFD">Эл. почта</small><div id="v-email">---</div></div>
                <div><small style="color:#6EBDFD">Имя пользователя</small><div id="v-username">---</div></div>
                <div><small style="color:#6EBDFD">О себе</small><div id="v-bio">---</div></div>
            </div>
            <button onclick="closeUserModal()" class="auth-btn" style="margin-top:25px; background:#444;">Закрыть</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <div onclick="toggleProfile(true)" style="cursor:pointer; padding:5px; opacity:0.7">☰</div>
            <input id="search-input" placeholder="Поиск" onkeyup="if(event.key==='Enter') searchUser(this.value)">
        </div>
        <div id="chat-list"></div>
    </div>

    <div id="main-chat">
        <div id="chat-header">
            <div onclick="goBack()" style="cursor:pointer; font-size:24px; display:none; padding-right:15px;" id="back-mobile">‹</div>
            <div class="avatar" id="header-av" onclick="openCurrentPeerProfile()">?</div>
            <div style="display:flex; flex-direction:column; cursor:pointer" onclick="openCurrentPeerProfile()">
                <div id="chat-title" style="font-weight:600;">Выберите чат</div>
                <div id="header-status" style="font-size:12px; color:#8E94A5;"></div>
            </div>
        </div>
        <div id="messages"></div>
        <form class="input-area" id="msg-form" onsubmit="event.preventDefault(); sendMessage();">
            <div class="input-wrapper">
                <div style="font-size: 20px; cursor: pointer; opacity: 0.7;">😊</div>
                <input id="input" placeholder="Сообщение" autocomplete="off">
                <label for="file-input" style="font-size: 20px; cursor: pointer; transform: rotate(45deg); opacity: 0.7;">📎</label>
                <input type="file" id="file-input" style="display:none" multiple>
            </div>
            <button type="submit" class="send-btn">➤</button>
        </form>
    </div>

    <div id="full-viewer" onclick="this.style.display='none'">
        <div id="viewer-content"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _sup = supabase.createClient('https://rlbrnsjluipocxommmvx.supabase.co', 'sb_publishable_p_5nubdUTK9RUqIcosNRlQ_M2wM9VeG');

        let myEmail = "", myId = "", currentPeer = null, profileCache = {}, lastRenderedDate = null;
        let cropData = { file: null, zoom: 1 };

        const fileInput = document.getElementById('file-input');
        const photoModal = document.getElementById('photo-modal');
        const modalCaption = document.getElementById('modal-caption');
        const previewContainer = document.getElementById('modal-preview-container');

        // --- ИНИЦИАЛИЗАЦИЯ ---
        async function init() {
            const { data: { session } } = await _sup.auth.getSession();
            if (session) {
                myEmail = session.user.email.toLowerCase().trim();
                myId = session.user.id;
                document.getElementById('auth-overlay').style.display = 'none';
                
                // Realtime: Сообщения + Статусы
                _sup.channel('main-channel')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                        const m = payload.new;
                        if ((m.author_email === myEmail && m.receiver_email === currentPeer) || 
                            (m.author_email === currentPeer && m.receiver_email === myEmail)) {
                            render(m);
                        }
                        loadHistory(); 
                    })
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'user_profiles' }, payload => {
                        const updated = payload.new;
                        if (updated.email === currentPeer) updateUIStatus(updated);
                        profileCache[updated.email] = null; // Инвалидируем кэш
                    })
                    .subscribe();

                loadHistory(); 
                loadMyProfile();
                setOnlineStatus();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
            }
        }

        async function setOnlineStatus() {
            await _sup.from('user_profiles').update({ status: 'online', last_seen: new Date().toISOString() }).eq('id', myId);
        }

        function updateUIStatus(profile) {
            const statusEl = document.getElementById('header-status');
            const subEl = document.getElementById('v-status-sub');
            const isOnline = profile.status === 'online';
            const text = isOnline ? "в сети" : "был(а) недавно";
            const color = isOnline ? "#6EBDFD" : "#8E94A5";
            
            if (statusEl) { statusEl.innerText = text; statusEl.style.color = color; }
            if (subEl) { subEl.innerText = text; subEl.style.color = color; }
        }

        // --- CROP LOGIC ---
        function initCrop(input) {
            const file = input.files[0];
            if (!file) return;
            cropData.file = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('crop-image');
                img.src = e.target.result;
                document.getElementById('crop-modal').style.display = 'flex';
                document.getElementById('zoom-slider').value = 1;
                img.style.transform = 'scale(1)';
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('zoom-slider').oninput = function() {
            const img = document.getElementById('crop-image');
            img.style.transform = `scale(${this.value})`;
        };

        function closeCrop() { document.getElementById('crop-modal').style.display = 'none'; }
        async function applyCrop() {
            if (cropData.file) {
                await uploadAvatar(cropData.file);
                closeCrop();
            }
        }

        // --- ПРОФИЛЬ ---
        async function loadMyProfile() {
            const { data: p } = await _sup.from('user_profiles').select('*').eq('id', myId).maybeSingle();
            if (p) {
                document.getElementById('p-first-name').value = p.display_name || "";
                document.getElementById('p-last-name').value = p.last_name || "";
                document.getElementById('p-username').value = p.username ? `@${p.username}` : "";
                document.getElementById('p-bio').value = p.bio || "";
                if (p.avatar_url) {
                    const img = document.getElementById('profile-av-img');
                    img.src = p.avatar_url;
                    img.style.display = "block";
                    document.getElementById('profile-av-letter').style.display = "none";
                }
            }
        }

        async function saveProfile() {
            const disp = document.getElementById('p-first-name').value.trim();
            const last = document.getElementById('p-last-name').value.trim();
            const user = document.getElementById('p-username').value.trim().replace('@','');
            const bio = document.getElementById('p-bio').value.trim();

            const { error } = await _sup.from('user_profiles').upsert({
                id: myId, email: myEmail, display_name: disp, last_name: last, username: user, bio: bio
            });
            if (!error) toggleProfile(false);
            else alert(error.message);
        }

        async function uploadAvatar(file) {
            const ext = file.name.split('.').pop();
            const path = `avatars/${myId}_${Date.now()}.${ext}`;
            const { error: upErr } = await _sup.storage.from('uploads').upload(path, file);
            if (upErr) return alert(upErr.message);

            const { data: { publicUrl } } = _sup.storage.from('uploads').getPublicUrl(path);
            await _sup.from('user_profiles').update({ avatar_url: publicUrl }).eq('id', myId);
            location.reload();
        }

        // --- ЧАТ ---
        async function loadHistory() {
            const { data: msgs } = await _sup.from('messages')
                .select('author_email, receiver_email, text, created_at, file_url')
                .or(`author_email.eq.${myEmail},receiver_email.eq.${myEmail}`)
                .order('created_at', { ascending: false });

            if (!msgs) return;
            const chatMap = new Map();
            msgs.forEach(m => {
                const peer = m.author_email === myEmail ? m.receiver_email : m.author_email;
                if (!chatMap.has(peer)) chatMap.set(peer, m);
            });

            const listEl = document.getElementById('chat-list');
            listEl.innerHTML = "";
            
            for (const [email, lastM] of chatMap) {
                const { data: p } = await _sup.from('user_profiles').select('*').eq('email', email).maybeSingle();
                const name = p ? (p.display_name || email) : email;
                const avHtml = (p && p.avatar_url) ? `<img src="${p.avatar_url}">` : name[0].toUpperCase();
                
                const item = document.createElement('div');
                item.className = `chat-item ${currentPeer === email ? 'active' : ''}`;
                item.innerHTML = `
                    <div class="avatar">${avHtml}</div>
                    <div style="flex-grow:1; overflow:hidden;">
                        <div style="font-weight:600; font-size:14px; display:flex; justify-content:space-between;">
                            <span>${name}</span>
                            <span style="font-size:10px; opacity:0.4;">${new Date(lastM.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                        <div style="font-size:12px; opacity:0.5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
                            ${lastM.text || (lastM.file_url ? '📸 Фото' : '...')}
                        </div>
                    </div>
                `;
                item.onclick = () => openChat(email);
                listEl.appendChild(item);
            }
        }

        async function openChat(email) {
            if (!email) return;
            currentPeer = email.toLowerCase().trim();
            document.body.classList.add('chat-open');
            lastRenderedDate = null;

            const { data: p } = await _sup.from('user_profiles').select('*').eq('email', currentPeer).maybeSingle();
            const name = p ? (p.display_name || currentPeer) : currentPeer;
            
            document.getElementById('chat-title').innerText = name;
            const hAv = document.getElementById('header-av');
            hAv.innerHTML = (p && p.avatar_url) ? `<img src="${p.avatar_url}">` : name[0].toUpperCase();
            
            if (p) updateUIStatus(p);

            const msgCont = document.getElementById('messages');
            msgCont.innerHTML = "";
            const { data } = await _sup.from('messages')
                .select('*')
                .or(`and(author_email.eq.${myEmail},receiver_email.eq.${currentPeer}),and(author_email.eq.${currentPeer},receiver_email.eq.${myEmail})`)
                .order('created_at', { ascending: true });
            
            if (data) data.forEach(render);
            msgCont.scrollTop = msgCont.scrollHeight;
        }

        async function sendMessage() {
            const inp = document.getElementById('input');
            const val = inp.value.trim();
            if (!val || !currentPeer) return;
            const txt = val; inp.value = "";
            await _sup.from('messages').insert([{ text: txt, author_email: myEmail, receiver_email: currentPeer, sender_id: myId }]);
        }

        function render(m) {
            renderDateDivider(m.created_at);
            const isMine = m.author_email === myEmail;
            const div = document.createElement('div');
            div.className = `msg ${isMine ? 'msg-mine' : 'msg-theirs'}`;
            
            let fHtml = "";
            if (m.file_url && m.file_url.length > 0) {
                fHtml = `<div class="photo-grid">`;
                m.file_url.forEach(u => {
                    const cleanU = String(u).replace(/[{}"]/g, "");
                    fHtml += `<img src="${cleanU}" onclick="openFullView('${cleanU}')">`;
                });
                fHtml += `</div>`;
            }

            const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            div.innerHTML = `${fHtml}${m.text ? `<div>${m.text}</div>` : ''}<div class="msg-info">${time} ${isMine ? '✓✓' : ''}</div>`;
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView();
        }

        function renderDateDivider(dateStr) {
            const date = new Date(dateStr).toLocaleDateString();
            if (lastRenderedDate !== date) {
                lastRenderedDate = date;
                const div = document.createElement('div');
                div.className = 'date-divider';
                div.innerText = date === new Date().toLocaleDateString() ? "Сегодня" : date;
                document.getElementById('messages').appendChild(div);
            }
        }

        // --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---
        function toggleProfile(s) { document.getElementById('profile-overlay').style.display = s ? 'flex' : 'none'; }
        function goBack() { document.body.classList.remove('chat-open'); currentPeer = null; }
        function openCurrentPeerProfile() { if (currentPeer) openUserProfile(currentPeer); }
        
        async function openUserProfile(email) {
            const { data: p } = await _sup.from('user_profiles').select('*').eq('email', email).maybeSingle();
            if (p) {
                document.getElementById('v-name').innerText = (p.display_name || 'User') + (p.last_name ? ' ' + p.last_name : '');
                document.getElementById('v-email').innerText = p.email;
                document.getElementById('v-username').innerText = p.username ? '@' + p.username : 'не указан';
                document.getElementById('v-bio').innerText = p.bio || 'Нет описания';
                const vAv = document.getElementById('v-avatar');
                vAv.innerHTML = p.avatar_url ? `<img src="${p.avatar_url}">` : (p.display_name || email)[0].toUpperCase();
                updateUIStatus(p);
                document.getElementById('view-user-modal').style.display = 'flex';
            }
        }

        function closeUserModal() { document.getElementById('view-user-modal').style.display = 'none'; }
        
        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-pass').value;
            let res = (type === 'register') ? await _sup.auth.signUp({ email, password }) : await _sup.auth.signInWithPassword({ email, password });
            if (res.error) {
                const err = document.getElementById('auth-error');
                err.innerText = res.error.message;
                err.style.display = 'block';
            } else location.reload();
        }

        function openFullView(u) {
            const v = document.getElementById('full-viewer');
            document.getElementById('viewer-content').innerHTML = `<img src="${u}" style="max-width:95vw; max-height:95vh; border-radius:8px;">`;
            v.style.display = 'flex';
        }

        function logout() { _sup.auth.signOut(); location.reload(); }

        // Работа с файлами
        fileInput.onchange = () => {
            const files = fileInput.files;
            if (!files.length) return;
            previewContainer.innerHTML = "";
            Array.from(files).forEach(f => {
                const url = URL.createObjectURL(f);
                const item = document.createElement('div');
                item.style.cssText = "aspect-ratio:1; background:#333; border-radius:8px; overflow:hidden;";
                item.innerHTML = f.type.startsWith('image/') ? `<img src="${url}" style="width:100%; height:100%; object-fit:cover;">` : `<div style="padding:10px;">📄</div>`;
                previewContainer.appendChild(item);
            });
            photoModal.style.display = 'flex';
        };

        function cancelFile() { fileInput.value = ""; photoModal.style.display = 'none'; }

        document.getElementById('modal-send-btn').onclick = async () => {
            const files = fileInput.files;
            const text = modalCaption.value.trim();
            if (!files.length || !currentPeer) return;
            
            const btn = document.getElementById('modal-send-btn');
            btn.innerText = "Загрузка..."; btn.disabled = true;

            try {
                let urls = [];
                for (let f of files) {
                    const name = `${Date.now()}_${Math.random().toString(36).substr(2,5)}.${f.name.split('.').pop()}`;
                    await _sup.storage.from('uploads').upload(name, f);
                    const { data: { publicUrl } } = _sup.storage.from('uploads').getPublicUrl(name);
                    urls.push(publicUrl);
                }
                await _sup.from('messages').insert([{ text, author_email: myEmail, receiver_email: currentPeer, file_url: urls, sender_id: myId }]);
                cancelFile();
            } catch (e) { alert(e.message); }
            finally { btn.innerText = "Отправить"; btn.disabled = false; }
        };

        init();
    </script>
</body>
</html>
