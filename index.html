<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Luminous Voice v0.8.5</title>
    <style>
        :root { --bg: #1E1F23; --card: #2E3037; --accent: #7058c9; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; display: flex; height: 100dvh; overflow: hidden; }
        
        /* Окно звонка */
        #call-overlay {
            position: fixed; inset: 0; background: #141517; z-index: 50000;
            display: none; flex-direction: column; align-items: center; justify-content: space-around; padding: 50px 20px;
        }
        .call-btn { width: 70px; height: 70px; border-radius: 50%; border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-accept { background: #2ecc71; }
        .btn-decline { background: #e74c3c; }
        .btn-mute { background: #565C69; width: 50px; height: 50px; font-size: 18px; margin-top: 20px; }
        .muted { background: #ff9f43 ! eccentricity; }

        /* Интерфейс чата (упрощенно) */
        #main { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; }
        #call-trigger { font-size: 30px; cursor: pointer; color: #2ecc71; margin-bottom: 20px; display: none; }
    </style>
</head>
<body onclick="unlockAudio()">

    <div id="call-overlay">
        <div style="text-align: center;">
            <div id="call-icon-big" style="font-size: 80px; background: var(--accent); width: 150px; height: 150px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">👤</div>
            <h2 id="call-name">Собеседник</h2>
            <p id="call-status">Звонок...</p>
            
            <button id="mute-btn" class="call-btn btn-mute" onclick="toggleMic()" style="display: none;">🎤</button>
        </div>

        <div style="display: flex; gap: 40px;">
            <button class="call-btn btn-decline" onclick="endCall()">✖</button>
            <button class="call-btn btn-accept" id="accept-btn" onclick="acceptCall()">📞</button>
        </div>
        
        <audio id="ringtone" loop src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3"></audio>
        <audio id="remote-audio" autoplay></audio>
    </div>

    <div id="main">
        <div id="call-trigger" onclick="startCall()">📞 Начать звонок</div>
        <div id="log" style="font-size: 12px; opacity: 0.5;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _sup = supabase.createClient('https://rlbrnsjluipocxommmvx.supabase.co', 'sb_publishable_p_5nubdUTK9RUqIcosNRlQ_M2wM9VeG');
        
        let myEmail = "", peer = "test@mail.com", callId = null;
        let localStream = null;
        let isMuted = false;

        async function init() {
            const { data: { session } } = await _sup.auth.getSession();
            if (session) {
                myEmail = session.user.email.toLowerCase().trim();
                document.getElementById('call-trigger').style.display = 'block';
                
                _sup.channel('calls').on('postgres_changes', { event: '*', schema: 'public', table: 'calls' }, payload => {
                    const c = payload.new;
                    if (payload.eventType === 'INSERT' && c.receiver_email === myEmail) {
                        callId = c.id;
                        openCallUI(c.caller_email, 'in');
                    }
                    if (payload.eventType === 'UPDATE' && c.id === callId) {
                        if (c.status === 'active') startVoice();
                        if (c.status === 'ended' || c.status === 'rejected') closeCallUI();
                    }
                }).subscribe();
            }
        }

        // --- ГОЛОСОВАЯ ЛОГИКА ---

        async function startVoice() {
            try {
                // Запрашиваем микрофон
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('call-status').innerText = "В эфире";
                document.getElementById('ringtone').pause();
                document.getElementById('mute-btn').style.display = 'flex';
                
                // Здесь в будущем добавится WebRTC для передачи потока. 
                // Пока что мы просто активируем микрофон локально для теста.
                console.log("Микрофон активирован");
            } catch (err) {
                alert("Ошибка доступа к микрофону: " + err.message);
                endCall();
            }
        }

        function toggleMic() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            
            const btn = document.getElementById('mute-btn');
            btn.innerText = isMuted ? "🔇" : "🎤";
            btn.classList.toggle('muted', isMuted);
            document.getElementById('call-status').innerText = isMuted ? "Микрофон выключен" : "В эфире";
        }

        function unlockAudio() {
            const r = document.getElementById('ringtone');
            r.play().then(() => { r.pause(); r.currentTime = 0; });
        }

        // --- УПРАВЛЕНИЕ ЗВОНКОМ ---

        async function startCall() {
            const target = prompt("Кому звоним (email)?", "test@mail.com");
            if (!target) return;
            peer = target.toLowerCase().trim();
            
            const { data } = await _sup.from('calls').insert([{
                caller_email: myEmail,
                receiver_email: peer,
                status: 'ringing'
            }]).select().single();
            
            callId = data.id;
            openCallUI(peer, 'out');
        }

        async function acceptCall() {
            await _sup.from('calls').update({ status: 'active' }).eq('id', callId);
        }

        async function endCall() {
            if (callId) await _sup.from('calls').update({ status: 'ended' }).eq('id', callId);
            closeCallUI();
        }

        function openCallUI(email, type) {
            document.getElementById('call-overlay').style.display = 'flex';
            document.getElementById('call-name').innerText = email;
            if (type === 'in') {
                document.getElementById('accept-btn').style.display = 'flex';
                document.getElementById('ringtone').play().catch(() => {});
            } else {
                document.getElementById('accept-btn').style.display = 'none';
            }
        }

        function closeCallUI() {
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            document.getElementById('call-overlay').style.display = 'none';
            document.getElementById('ringtone').pause();
            document.getElementById('mute-btn').style.display = 'none';
            isMuted = false;
        }

        init();
    </script>
</body>
</html>
