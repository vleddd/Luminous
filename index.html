<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luminous v0.8 - Final Fix</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #25272D; color: #fff; height: 100dvh; display: flex; overflow: hidden; }

        /* ИСПРАВЛЕНИЕ: Чтобы на смартфонах лонг-тап работал без выделения текста */
        .msg { user-select: none; -webkit-user-select: none; touch-action: manipulation; position: relative; cursor: pointer; }
        
        /* КОНТЕКСТНОЕ МЕНЮ (для редактирования и удаления) */
        #context-menu {
            position: fixed; z-index: 40000; display: none; width: 180px;
            background: #2E3037; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden;
        }
        .menu-item { padding: 12px 16px; font-size: 14px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .menu-item:active { background: rgba(255,255,255,0.1); }
        .menu-item.red { color: #ff5e5e; }

        /* ВСЕ ОСТАЛЬНЫЕ СТИЛИ ИЗ ТВОЕЙ V0.7 */
        #auth-overlay { position: fixed; inset: 0; background: #1E1F23; z-index: 10000; display: none; align-items: center; justify-content: center; }
        .auth-card { background: #2E3037; padding: 35px; border-radius: 24px; width: 340px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; border: none; background: #23242A; color: #fff; outline: none; font-size: 16px; }
        .auth-btn { width: 100%; padding: 12px; background: #7058c9; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .auth-secondary { background: transparent; color: #6EBDFD; border: 1px solid #6EBDFD; }

        #delete-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .delete-card { background: #2E3037; padding: 25px; border-radius: 24px; width: 100%; max-width: 340px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .del-btn-red { width: 100%; padding: 12px; background: #ff4d4d; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .del-btn-gray { width: 100%; padding: 12px; background: #3D3F46; color: white; border: none; border-radius: 12px; cursor: pointer; margin-bottom: 10px; }

        #photo-modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 30000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #2E3037; border-radius: 24px; width: 100%; max-width: 450px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); }
        .modal-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .modal-body { padding: 15px; background: #1a1b1e; max-height: 60vh; overflow-y: auto; display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }
        .preview-item { position: relative; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; background: #23242A; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
        .preview-item img, .preview-item video { width: 100%; height: 100%; object-fit: cover; }
        .modal-footer { padding: 15px 20px; background: #2E3037; display: flex; gap: 12px; align-items: center; }
        #modal-caption { background: #23242A; border: none; color: #fff; outline: none; flex-grow: 1; font-size: 16px; padding: 10px 15px; border-radius: 12px; }

        #full-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 50000; display: none; align-items: center; justify-content: center; padding: 10px; }
        #viewer-content img, #viewer-content video { max-width: 100%; max-height: 95vh; border-radius: 8px; }

        #sidebar { width: 300px; background: #25272D; border-right: 1px solid rgba(0,0,0,0.2); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 10px; background: #252935; display: flex; align-items: center; gap: 10px; border-radius: 10px; margin: 5px; }
        #search-input { background: #33353B; border: none; border-radius: 40px; color: #fff; outline: none; padding: 8px 15px; flex-grow: 1; font-size: 14px; }
        #chat-list { overflow-y: auto; flex-grow: 1; padding: 10px; }
        .chat-item { border-radius: 15px; margin-bottom: 8px; padding: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; user-select: none; }
        .chat-item.active { background: #34373F !important; border: 1px solid #565C69; }

        #main-chat { flex-grow: 1; display: flex; flex-direction: column; background: #2E3037; position: relative; }
        #chat-header { padding: 10px 20px; background: #25272D; display: flex; align-items: center; gap: 12px; height: 60px; margin: 5px; border-radius: 10px; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .date-divider { align-self: center; background: rgba(0,0,0,0.2); color: #BAC1F3; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin: 15px 0; opacity: 0.8; }

        .msg { width: fit-content; min-width: 80px; max-width: 85%; padding: 10px 14px; font-size: 15px; word-wrap: break-word; display: flex; flex-direction: column; }
        .msg-info { font-size: 10px; opacity: 0.5; margin-top: 4px; align-self: flex-end; display: flex; gap: 4px; }
        .msg-theirs { align-self: flex-start; background: #191a1d; border-radius: 18px 18px 18px 4px; }
        .msg-mine { align-self: flex-end; background: #7058c9; border-radius: 18px 18px 4px 18px; }

        .photo-grid { display: grid; gap: 4px; margin-bottom: 6px; border-radius: 12px; overflow: hidden; width: 100%; max-width: 320px; }
        .photo-grid img, .photo-grid video { width: 100%; height: 160px; object-fit: cover; cursor: pointer; display: block; background: rgba(0,0,0,0.1); }
        .grid-1 img, .grid-1 video { height: auto; max-height: 300px; object-fit: contain; }
        .grid-2 { grid-template-columns: 1fr 1fr; }

        .input-area { padding: 10px 20px; display: flex; align-items: center; gap: 12px; background: #2E3037; }
        .input-wrapper { background: #23242A; flex-grow: 1; border-radius: 15px; padding: 12px 15px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
        #input { background: none; border: none; color: #fff; outline: none; flex-grow: 1; font-size: 16px; }
        .send-btn { color: #6EBDFD; font-size: 28px; cursor: pointer; background: none; border: none; display: flex; align-items: center; }

        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #E0E2E5; color: #444; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; text-transform: uppercase; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; height: 100%; z-index: 10; }
            #main-chat { width: 100%; position: absolute; height: 100%; z-index: 20; transform: translateX(100%); transition: 0.25s ease; }
            body.chat-open #main-chat { transform: translateX(0); }
            #back-mobile { display: block !important; }
        }
    </style>
</head>
<body onclick="closeMenu()">

    <div id="context-menu" onclick="event.stopPropagation()"></div>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color: #BAC1F3; margin-bottom: 20px;">Luminous</h2>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button onclick="handleAuth('login')" class="auth-btn">Войти</button>
            <button onclick="handleAuth('register')" class="auth-btn auth-secondary">Регистрация</button>
            <p id="auth-error" style="color: #ff5e5e; font-size: 12px; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div id="photo-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span style="font-weight: bold;">Отправить файлы</span>
                <span onclick="cancelFile()" style="cursor: pointer; font-size: 24px;">×</span>
            </div>
            <div class="modal-body" id="modal-preview-container"></div>
            <div class="modal-footer">
                <input id="modal-caption" placeholder="Добавьте подпись..." autocomplete="off">
                <button class="modal-send-btn" id="modal-send-btn">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <div id="full-viewer" onclick="this.style.display='none'">
        <div id="viewer-content"></div>
    </div>

    <div id="delete-modal" onclick="closeDeleteModal()">
        <div class="delete-card" onclick="event.stopPropagation()">
            <h3 style="margin-top: 0; color: #fff;">Удалить чат?</h3>
            <p id="delete-info" style="color: #8E94A5; font-size: 14px; margin-bottom: 20px;"></p>
            <button id="del-only-me" class="del-btn-gray">Удалить только у меня</button>
            <button id="del-both" class="del-btn-red">Удалить у обоих</button>
            <button onclick="closeDeleteModal()" style="background:none; border:none; color:#8E94A5; cursor:pointer; width:100%; padding:10px;">Отмена</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <div class="menu-btn" style="cursor:pointer; opacity:0.6;">☰</div>
            <input id="search-input" placeholder="Search" onkeyup="if(event.key==='Enter') openChat(this.value)">
            <div style="color: #BAC1F3; font-weight: bold; font-size: 14px; margin-left: auto;">Luminous</div>
        </div>
        <div id="chat-list"></div>
    </div>

    <div id="main-chat">
        <div id="chat-header">
            <div onclick="goBack()" style="cursor:pointer; font-size:24px; display:none; padding-right:10px;" id="back-mobile">‹</div>
            <div class="avatar" id="header-av">?</div>
            <div id="chat-title" style="font-weight:600;">Выберите собеседника</div>
            <div onclick="logout()" style="margin-left: auto; cursor: pointer; opacity: 0.5; font-size: 12px;">Выйти</div>
        </div>
        <div id="messages"></div>
        <form class="input-area" id="msg-form">
            <div class="input-wrapper">
                <div id="cancel-edit" style="display:none; color:red; cursor:pointer;" onclick="stopEditing()">✕</div>
                <input id="input" placeholder="Message" autocomplete="off">
                <label for="file-input" style="font-size: 20px; cursor: pointer; transform: rotate(45deg); opacity: 0.7;">📎</label>
                <input type="file" id="file-input" style="display:none" multiple>
            </div>
            <button type="submit" class="send-btn" id="send-btn">➤</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _sup = supabase.createClient('https://rlbrnsjluipocxommmvx.supabase.co', 'sb_publishable_p_5nubdUTK9RUqIcosNRlQ_M2wM9VeG');
        let myEmail = "", currentPeer = null, profileCache = {}, lastRenderedDate = null, chatToDelete = null, editingId = null, pressTimer = null, selectedMsg = null;

        async function init() {
            const { data: { session } } = await _sup.auth.getSession();
            if (session) {
                myEmail = session.user.email.toLowerCase().trim();
                document.getElementById('auth-overlay').style.display = 'none';
                _sup.channel('db-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, payload => {
                    const m = payload.new || payload.old;
                    if (isRelevant(m)) {
                        if (payload.eventType === 'INSERT') render(m);
                        if (payload.eventType === 'UPDATE') updateUI(m);
                        if (payload.eventType === 'DELETE') document.getElementById(`msg-${m.id}`)?.remove();
                    }
                    loadHistory();
                }).subscribe();
                loadHistory();
            } else document.getElementById('auth-overlay').style.display = 'flex';
        }

        const isRelevant = (m) => (m.author_email === myEmail && m.receiver_email === currentPeer) || (m.author_email === currentPeer && m.receiver_email === myEmail);

        // МЕНЮ И ДЕЙСТВИЯ (ИСПРАВЛЕНО)
        function showMenu(e, m) {
            e.preventDefault(); e.stopPropagation();
            selectedMsg = m;
            const menu = document.getElementById('context-menu');
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 100);
            let y = e.clientY || (e.touches ? e.touches[0].clientY : 100);

            menu.innerHTML = `
                <div class="menu-item" onclick="copyText('${m.text}')">Копировать</div>
                ${m.author_email === myEmail ? `<div class="menu-item" onclick="startEdit()">Изменить</div>` : ''}
                <div class="menu-item red" onclick="deleteMsg(${m.id})">Удалить</div>
            `;
            menu.style.display = 'block';
            menu.style.left = Math.min(x, window.innerWidth - 190) + 'px';
            menu.style.top = Math.min(y, window.innerHeight - 150) + 'px';
        }

        function closeMenu() { document.getElementById('context-menu').style.display = 'none'; }
        function copyText(t) { if(t) navigator.clipboard.writeText(t); closeMenu(); }

        function startEdit() {
            if (!selectedMsg.text) return closeMenu();
            editingId = selectedMsg.id;
            const inp = document.getElementById('input');
            inp.value = selectedMsg.text; inp.focus();
            document.getElementById('cancel-edit').style.display = 'block';
            document.getElementById('send-btn').innerText = '✓';
            closeMenu();
        }

        function stopEditing() {
            editingId = null;
            document.getElementById('input').value = "";
            document.getElementById('cancel-edit').style.display = 'none';
            document.getElementById('send-btn').innerText = '➤';
        }

        async function deleteMsg(id) {
            await _sup.from('messages').delete().eq('id', id);
            closeMenu();
        }

        // РЕНДЕР И ИНТЕРФЕЙС
        function render(m) {
            if (document.getElementById(`msg-${m.id}`)) return;
            renderDateDivider(m.created_at);
            const div = document.createElement('div');
            div.id = `msg-${m.id}`;
            div.className = `msg ${m.author_email === myEmail ? 'msg-mine' : 'msg-theirs'}`;
            
            // Обработка зажатия
            div.oncontextmenu = (e) => showMenu(e, m);
            div.ontouchstart = (e) => pressTimer = setTimeout(() => showMenu(e, m), 600);
            div.ontouchend = () => clearTimeout(pressTimer);
            div.ontouchmove = () => clearTimeout(pressTimer);

            updateUI(m, div);
            const box = document.getElementById('messages');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function updateUI(m, el = null) {
            const target = el || document.getElementById(`msg-${m.id}`);
            if (!target) return;
            let fHtml = "";
            if (m.file_url) {
                const urls = Array.isArray(m.file_url) ? m.file_url : [m.file_url];
                fHtml = `<div class="photo-grid grid-${Math.min(urls.length, 2)}">`;
                urls.forEach(url => {
                    const u = String(url).replace(/[{}"]/g, "").trim();
                    if(u.match(/\.(mp4|webm|mov)/i)) fHtml += `<video src="${u}" muted loop onmouseover="this.play()" onclick="openFullView('${u}',true)"></video>`;
                    else if(u.match(/\.(jpg|jpeg|png|webp|gif)/i)) fHtml += `<img src="${u}" onclick="openFullView('${u}',false)">`;
                    else fHtml += `<div class="file-icon-label" onclick="window.open('${u}')">📁 Документ</div>`;
                });
                fHtml += `</div>`;
            }
            const time = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const status = m.author_email === myEmail ? (m.is_read ? '✓✓' : '✓') : '';
            target.innerHTML = `${fHtml} <div style="white-space:pre-wrap">${m.text || ''}</div> <div class="msg-info"><span>${m.is_edited ? '(изм.) ' : ''}${time}</span><span style="color:#58BFFF">${status}</span></div>`;
        }

        // ОТПРАВКА И ФАЙЛЫ
        document.getElementById('msg-form').onsubmit = async (e) => {
            e.preventDefault();
            const val = document.getElementById('input').value.trim();
            if (!val || !currentPeer) return;

            if (editingId) {
                await _sup.from('messages').update({ text: val, is_edited: true }).eq('id', editingId);
                stopEditing();
            } else {
                await _sup.from('messages').insert([{ text: val, author_email: myEmail, receiver_email: currentPeer }]);
                document.getElementById('input').value = "";
            }
        };

        document.getElementById('file-input').onchange = () => {
            const files = document.getElementById('file-input').files;
            if (!files.length) return;
            const container = document.getElementById('modal-preview-container');
            container.innerHTML = "";
            Array.from(files).forEach(f => {
                const url = URL.createObjectURL(f);
                const item = document.createElement('div');
                item.className = "preview-item";
                item.innerHTML = f.type.startsWith('image/') ? `<img src="${url}">` : `<div style="color:#BAC1F3">📄</div>`;
                container.appendChild(item);
            });
            document.getElementById('photo-modal').style.display = 'flex';
        };

        document.getElementById('modal-send-btn').onclick = async () => {
            const files = document.getElementById('file-input').files;
            const btn = document.getElementById('modal-send-btn');
            btn.innerText = "..."; btn.disabled = true;
            let urls = [];
            for (let f of files) {
                const name = `${Date.now()}_${f.name}`;
                await _sup.storage.from('uploads').upload(name, f);
                urls.push(_sup.storage.from('uploads').getPublicUrl(name).data.publicUrl);
            }
            await _sup.from('messages').insert([{ text: document.getElementById('modal-caption').value, author_email: myEmail, receiver_email: currentPeer, file_url: urls }]);
            cancelFile();
            btn.innerText = "ОТПРАВИТЬ"; btn.disabled = false;
        };

        function cancelFile() { document.getElementById('photo-modal').style.display = 'none'; document.getElementById('file-input').value = ""; }
        
        function openFullView(url, isVid) {
            const v = document.getElementById('full-viewer');
            document.getElementById('viewer-content').innerHTML = isVid ? `<video src="${url}" controls autoplay></video>` : `<img src="${url}">`;
            v.style.display = 'flex';
        }

        // ИСТОРИЯ И ЧАТЫ
        async function openChat(email) {
            currentPeer = email.toLowerCase().trim();
            document.body.classList.add('chat-open');
            const name = await getProfileName(currentPeer);
            document.getElementById('chat-title').innerText = name;
            document.getElementById('header-av').innerText = name[0];
            document.getElementById('messages').innerHTML = "";
            lastRenderedDate = null;
            const { data } = await _sup.from('messages').select('*').or(`and(author_email.eq.${myEmail},receiver_email.eq.${currentPeer}),and(author_email.eq.${currentPeer},receiver_email.eq.${myEmail})`).order('created_at', { ascending: true });
            if (data) data.forEach(render);
            loadHistory();
        }

        async function loadHistory() {
            const { data: msgs } = await _sup.from('messages').select('author_email, receiver_email').or(`author_email.eq.${myEmail},receiver_email.eq.${myEmail}`);
            if (!msgs) return;
            const hidden = JSON.parse(localStorage.getItem('hidden_chats') || "[]");
            const emails = [...new Set(msgs.map(m => m.author_email === myEmail ? m.receiver_email : m.author_email))].filter(e => !hidden.includes(e));
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            for (let e of emails) {
                const name = await getProfileName(e);
                const item = document.createElement('div');
                item.className = `chat-item ${currentPeer === e ? 'active' : ''}`;
                item.innerHTML = `<div class="avatar">${name[0]}</div><div>${name}</div>`;
                item.onclick = () => openChat(e);
                item.oncontextmenu = (ev) => { ev.preventDefault(); openDeleteMenu(e); };
                list.appendChild(item);
            }
        }

        async function openDeleteMenu(email) {
            chatToDelete = email;
            document.getElementById('delete-info').innerText = `Чат с ${email}`;
            document.getElementById('delete-modal').style.display = 'flex';
        }

        document.getElementById('del-both').onclick = async () => {
            await _sup.from('messages').delete().or(`and(author_email.eq.${myEmail},receiver_email.eq.${chatToDelete}),and(author_email.eq.${chatToDelete},receiver_email.eq.${myEmail})`);
            closeDeleteModal();
        };

        document.getElementById('del-only-me').onclick = () => {
            let h = JSON.parse(localStorage.getItem('hidden_chats') || "[]");
            h.push(chatToDelete);
            localStorage.setItem('hidden_chats', JSON.stringify(h));
            closeDeleteModal();
            loadHistory();
        };

        function closeDeleteModal() { document.getElementById('delete-modal').style.display = 'none'; chatToDelete = null; }

        function renderDateDivider(dateStr) {
            const d = new Date(dateStr).toLocaleDateString();
            if (lastRenderedDate !== d) {
                lastRenderedDate = d;
                const div = document.createElement('div');
                div.className = 'date-divider';
                div.innerText = d === new Date().toLocaleDateString() ? "Сегодня" : d;
                document.getElementById('messages').appendChild(div);
            }
        }

        async function getProfileName(email) {
            if (profileCache[email]) return profileCache[email];
            const { data } = await _sup.from('user_profiles').select('display_name').eq('email', email).maybeSingle();
            profileCache[email] = data?.display_name || email.split('@')[0];
            return profileCache[email];
        }

        async function handleAuth(type) {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            const res = type === 'register' ? await _sup.auth.signUp({ email: e, password: p }) : await _sup.auth.signInWithPassword({ email: e, password: p });
            if (res.error) alert(res.error.message); else location.reload();
        }
        function logout() { _sup.auth.signOut(); location.reload(); }
        function goBack() { document.body.classList.remove('chat-open'); currentPeer = null; }

        init();
    </script>
</body>
</html>
