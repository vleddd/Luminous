<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luminous v0.8 - Edit & Delete</title>
    <style>
        /* БАЗОВЫЕ СТИЛИ (ТВОИ) */
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #25272D; color: #fff; height: 100dvh; display: flex; overflow: hidden; }

        /* ОКНО РЕГИСТРАЦИИ */
        #auth-overlay { position: fixed; inset: 0; background: #1E1F23; z-index: 10000; display: none; align-items: center; justify-content: center; }
        .auth-card { background: #2E3037; padding: 35px; border-radius: 24px; width: 340px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; border: none; background: #23242A; color: #fff; outline: none; font-size: 16px; }
        .auth-btn { width: 100%; padding: 12px; background: #7058c9; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .auth-secondary { background: transparent; color: #6EBDFD; border: 1px solid #6EBDFD; }

        /* МОДАЛКА УДАЛЕНИЯ */
        #delete-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .delete-card { background: #2E3037; padding: 25px; border-radius: 24px; width: 100%; max-width: 340px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .del-btn-red { width: 100%; padding: 12px; background: #ff4d4d; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .del-btn-gray { width: 100%; padding: 12px; background: #3D3F46; color: white; border: none; border-radius: 12px; cursor: pointer; margin-bottom: 10px; }

        /* ФОТО МОДАЛКА */
        #photo-modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 30000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #2E3037; border-radius: 24px; width: 100%; max-width: 450px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); }
        .modal-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 15px; background: #1a1b1e; max-height: 60vh; overflow-y: auto; display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }
        .preview-item { position: relative; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; background: #23242A; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
        .preview-item img, .preview-item video { width: 100%; height: 100%; object-fit: cover; }
        .modal-footer { padding: 15px 20px; background: #2E3037; display: flex; gap: 12px; }
        #modal-caption { background: #23242A; border: none; color: #fff; outline: none; flex-grow: 1; font-size: 16px; padding: 10px 15px; border-radius: 12px; }

        /* ЭЛЕМЕНТЫ СООБЩЕНИЙ И КОНТЕКСТНОЕ МЕНЮ */
        #msg-context-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 40000; display: none; 
            transition: background 0.3s;
        }
        #msg-context-overlay.mobile-active { background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }

        .context-menu { 
            position: fixed; background: #2E3037; border-radius: 14px; min-width: 160px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); 
            z-index: 40001; display: none; padding: 6px;
        }
        .context-item { 
            padding: 10px 14px; border-radius: 8px; cursor: pointer; display: flex; 
            align-items: center; gap: 10px; font-size: 14px; transition: 0.2s;
        }
        .context-item:hover { background: rgba(255,255,255,0.05); }
        .context-item.red { color: #ff4d4d; }

        /* САЙДБАР И ЧАТ */
        #sidebar { width: 300px; background: #25272D; border-right: 1px solid rgba(0,0,0,0.2); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 10px; background: #252935; display: flex; align-items: center; gap: 10px; border-radius: 10px; margin: 5px; }
        #search-input { background: #33353B; border: none; border-radius: 40px; color: #fff; outline: none; padding: 8px 15px; flex-grow: 1; font-size: 14px; }
        #chat-list { overflow-y: auto; flex-grow: 1; padding: 10px; }
        .chat-item { border-radius: 15px; margin-bottom: 8px; padding: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
        .chat-item.active { background: #34373F !important; border: 1px solid #565C69; }

        #main-chat { flex-grow: 1; display: flex; flex-direction: column; background: #2E3037; position: relative; }
        #chat-header { padding: 10px 20px; background: #25272D; display: flex; align-items: center; gap: 12px; height: 60px; margin: 5px; border-radius: 10px; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { width: fit-content; min-width: 80px; max-width: 85%; padding: 10px 14px; font-size: 15px; word-wrap: break-word; display: flex; flex-direction: column; position: relative; transition: 0.2s; }
        .msg-info { font-size: 10px; opacity: 0.5; margin-top: 4px; align-self: flex-end; display: flex; gap: 4px; }
        .msg-theirs { align-self: flex-start; background: #191a1d; border-radius: 18px 18px 18px 4px; }
        .msg-mine { align-self: flex-end; background: #7058c9; border-radius: 18px 18px 4px 18px; }
        .msg.highlight { z-index: 40002; box-shadow: 0 0 0 1000px rgba(0,0,0,0); } /* Для мобильного выделения */

        .date-divider { align-self: center; background: rgba(0,0,0,0.2); color: #BAC1F3; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin: 15px 0; font-weight: 500; }
        .photo-grid { display: grid; gap: 4px; margin-bottom: 6px; border-radius: 12px; overflow: hidden; width: 100%; max-width: 320px; }
        .photo-grid img, .photo-grid video { width: 100%; height: 160px; object-fit: cover; cursor: pointer; background: rgba(0,0,0,0.1); }
        
        /* ИНПУТ */
        .input-area { padding: 10px 20px; display: flex; align-items: center; gap: 12px; background: #2E3037; }
        .input-wrapper { background: #23242A; flex-grow: 1; border-radius: 15px; padding: 12px 15px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
        #input { background: none; border: none; color: #fff; outline: none; flex-grow: 1; font-size: 16px; }
        .send-btn { color: #6EBDFD; font-size: 28px; cursor: pointer; background: none; border: none; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #E0E2E5; color: #444; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; text-transform: uppercase; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; height: 100%; z-index: 10; }
            #main-chat { width: 100%; position: absolute; height: 100%; z-index: 20; transform: translateX(100%); transition: 0.25s ease; }
            body.chat-open #main-chat { transform: translateX(0); }
            #back-mobile { display: block !important; }
        }
    </style>
</head>
<body>

    <div id="msg-context-overlay" onclick="closeContextMenu()"></div>
    <div id="context-menu" class="context-menu">
        <div class="context-item" onclick="copyMsgText()"><span>📋</span> Копировать</div>
        <div id="ctx-edit" class="context-item" onclick="startEditMsg()"><span>✏️</span> Изменить</div>
        <div class="context-item red" onclick="openDeleteMsgModal()"><span>🗑️</span> Удалить</div>
    </div>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color: #BAC1F3; margin-bottom: 20px;">Luminous</h2>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button onclick="handleAuth('login')" class="auth-btn">Войти</button>
            <button onclick="handleAuth('register')" class="auth-btn auth-secondary">Регистрация</button>
            <p id="auth-error" style="color: #ff5e5e; font-size: 12px; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div id="delete-msg-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:50000; align-items:center; justify-content:center;">
        <div class="delete-card">
            <h3 style="color:#fff">Удалить сообщение?</h3>
            <button class="del-btn-gray" onclick="confirmDeleteMsg('me')">Удалить только у меня</button>
            <button id="btn-del-both" class="del-btn-red" onclick="confirmDeleteMsg('both')">Удалить у обоих</button>
            <button onclick="this.parentElement.parentElement.style.display='none'" style="background:none; border:none; color:#8E94A5; cursor:pointer; width:100%; padding:10px;">Отмена</button>
        </div>
    </div>

    <div id="photo-modal">
        <div class="modal-content">
            <div class="modal-header"><span style="font-weight:bold;">Отправить файлы</span><span onclick="cancelFile()" style="cursor:pointer; font-size:24px;">×</span></div>
            <div class="modal-body" id="modal-preview-container"></div>
            <div class="modal-footer">
                <input id="modal-caption" placeholder="Добавьте подпись..." autocomplete="off">
                <button class="auth-btn" style="width:auto; margin:0" id="modal-send-btn">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" onclick="closeDeleteModal()">
        <div class="delete-card" onclick="event.stopPropagation()">
            <h3 style="margin-top:0; color:#fff;">Удалить чат?</h3>
            <p id="delete-info" style="color:#8E94A5; font-size:14px; margin-bottom:20px;"></p>
            <button id="del-only-me" class="del-btn-gray">Удалить только у меня</button>
            <button id="del-both" class="del-btn-red">Удалить у обоих</button>
            <button onclick="closeDeleteModal()" style="background:none; border:none; color:#8E94A5; cursor:pointer; width:100%; padding:10px;">Отмена</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <div style="cursor:pointer; opacity:0.6;">☰</div>
            <input id="search-input" placeholder="Search" onkeyup="if(event.key==='Enter') openChat(this.value)">
            <div style="color:#BAC1F3; font-weight:bold; font-size:14px; margin-left:auto;">Luminous</div>
        </div>
        <div id="chat-list"></div>
    </div>

    <div id="main-chat">
        <div id="chat-header">
            <div onclick="goBack()" style="cursor:pointer; font-size:24px; display:none; padding-right:10px;" id="back-mobile">‹</div>
            <div class="avatar" id="header-av">?</div>
            <div id="chat-title" style="font-weight:600;">Выберите собеседника</div>
            <div onclick="logout()" style="margin-left:auto; cursor:pointer; opacity:0.5; font-size:12px;">Выйти</div>
        </div>
        <div id="messages"></div>
        <form class="input-area" id="msg-form">
            <div class="input-wrapper">
                <div style="font-size:20px; cursor:pointer; opacity:0.7;">😊</div>
                <input id="input" placeholder="Message" autocomplete="off">
                <label for="file-input" style="font-size:20px; cursor:pointer; transform:rotate(45deg); opacity:0.7;">📎</label>
                <input type="file" id="file-input" style="display:none" multiple>
            </div>
            <button type="submit" class="send-btn" id="send-btn-main">➤</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _sup = supabase.createClient('https://rlbrnsjluipocxommmvx.supabase.co', 'sb_publishable_p_5nubdUTK9RUqIcosNRlQ_M2wM9VeG');

        let myEmail = "", currentPeer = null, profileCache = {}, lastRenderedDate = null;
        let selectedMsg = null, isEditing = false, longPressTimer = null;

        async function init() {
            const { data: { session } } = await _sup.auth.getSession();
            if (session) {
                myEmail = session.user.email.toLowerCase().trim();
                document.getElementById('auth-overlay').style.display = 'none';
                
                // Realtime: теперь слушаем INSERT, UPDATE и DELETE
                _sup.channel('msg-changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, payload => {
                        const m = payload.new || payload.old;
                        if ((m.author_email === myEmail && m.receiver_email === currentPeer) || 
                            (m.author_email === currentPeer && m.receiver_email === myEmail)) {
                            
                            if (payload.eventType === 'INSERT') render(m);
                            if (payload.eventType === 'UPDATE') updateMsgInUI(m);
                            if (payload.eventType === 'DELETE') removeMsgFromUI(payload.old.id);
                        }
                        loadHistory();
                    }).subscribe();

                loadHistory();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
            }
        }

        // --- ЛОГИКА КОНТЕКСТНОГО МЕНЮ ---

        function showContextMenu(e, msgObj, element) {
            e.preventDefault();
            selectedMsg = { data: msgObj, el: element };
            const menu = document.getElementById('context-menu');
            const overlay = document.getElementById('msg-context-overlay');
            
            // Если моб. устройство (проверяем тип события или ширину)
            if (e.type === 'touchstart' || window.innerWidth < 768) {
                overlay.classList.add('mobile-active');
                element.classList.add('highlight');
            }

            document.getElementById('ctx-edit').style.display = msgObj.author_email === myEmail ? 'flex' : 'none';
            document.getElementById('btn-del-both').style.display = msgObj.author_email === myEmail ? 'block' : 'none';

            overlay.style.display = 'block';
            menu.style.display = 'block';

            // Позиционирование под сообщением
            const rect = element.getBoundingClientRect();
            menu.style.left = Math.min(rect.left, window.innerWidth - 170) + 'px';
            menu.style.top = rect.bottom + 5 + 'px';
        }

        function closeContextMenu() {
            document.getElementById('msg-context-overlay').style.display = 'none';
            document.getElementById('msg-context-overlay').classList.remove('mobile-active');
            document.getElementById('context-menu').style.display = 'none';
            if (selectedMsg?.el) selectedMsg.el.classList.remove('highlight');
        }

        function copyMsgText() {
            if (selectedMsg?.data.text) navigator.clipboard.writeText(selectedMsg.data.text);
            closeContextMenu();
        }

        function startEditMsg() {
            if (!selectedMsg) return;
            isEditing = true;
            const input = document.getElementById('input');
            input.value = selectedMsg.data.text;
            input.focus();
            document.getElementById('send-btn-main').innerText = '✓';
            closeContextMenu();
        }

        function openDeleteMsgModal() {
            document.getElementById('delete-msg-modal').style.display = 'flex';
            closeContextMenu();
        }

        async function confirmDeleteMsg(mode) {
            if (!selectedMsg) return;
            if (mode === 'both') {
                await _sup.from('messages').delete().eq('id', selectedMsg.data.id);
            } else {
                // Локальное скрытие (упрощенно - просто удаляем из DOM)
                removeMsgFromUI(selectedMsg.data.id);
            }
            document.getElementById('delete-msg-modal').style.display = 'none';
        }

        function updateMsgInUI(m) {
            const el = document.querySelector(`[data-id="${m.id}"]`);
            if (el) {
                const textDiv = el.querySelector('.msg-text');
                if (textDiv) textDiv.innerText = m.text;
                const info = el.querySelector('.msg-info');
                if (!info.innerHTML.includes('(изм.)')) {
                    info.insertAdjacentHTML('afterbegin', `<span style="opacity:0.6; margin-right:5px;">(изм.)</span>`);
                }
                // Обновляем данные в атрибуте для будущих открытий меню
                el.onclick = (e) => showContextMenu(e, m, el); 
            }
        }

        function removeMsgFromUI(id) {
            const el = document.querySelector(`[data-id="${id}"]`);
            if (el) el.remove();
        }

        // --- РЕНДЕР И ИСТОРИЯ ---

        function render(m) {
            renderDateDivider(m.created_at);
            const isMine = m.author_email.toLowerCase() === myEmail;
            const div = document.createElement('div');
            div.className = `msg ${isMine ? 'msg-mine' : 'msg-theirs'}`;
            div.setAttribute('data-id', m.id);
            
            // ПК: Правый клик
            div.oncontextmenu = (e) => showContextMenu(e, m, div);
            
            // Мобилки: Long Press
            div.ontouchstart = (e) => {
                longPressTimer = setTimeout(() => showContextMenu(e, m, div), 600);
            };
            div.ontouchend = () => clearTimeout(longPressTimer);

            let fHtml = "";
            if (m.file_url) {
                const urls = Array.isArray(m.file_url) ? m.file_url : [m.file_url];
                fHtml = `<div class="photo-grid grid-${Math.min(urls.length, 4)}">`;
                urls.forEach(url => {
                    const clean = String(url).replace(/[{}"]/g, "").trim();
                    if (clean.match(/\.(mp4|webm|mov)/i)) fHtml += `<video src="${clean}" muted loop></video>`;
                    else fHtml += `<img src="${clean}">`;
                });
                fHtml += `</div>`;
            }

            const time = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const edited = m.updated_at && m.updated_at !== m.created_at ? '<span style="opacity:0.6; margin-right:5px;">(изм.)</span>' : '';
            const tick = isMine ? (m.is_read ? '✓✓' : '✓') : '';
            
            div.innerHTML = `
                ${fHtml}
                <div class="msg-text" style="white-space: pre-wrap;">${m.text || ''}</div>
                <div class="msg-info">
                    ${edited} <span>${time}</span> 
                    <span style="font-weight:bold; color:#58BFFF;">${tick}</span>
                </div>`;
                
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        document.getElementById('msg-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('input');
            const val = input.value.trim();
            if (!val || !currentPeer) return;

            if (isEditing && selectedMsg) {
                await _sup.from('messages').update({ text: val, updated_at: new Date().toISOString() }).eq('id', selectedMsg.data.id);
                isEditing = false;
                selectedMsg = null;
                document.getElementById('send-btn-main').innerText = '➤';
            } else {
                await _sup.from('messages').insert([{ 
                    text: val, author_email: myEmail, receiver_email: currentPeer, is_read: false 
                }]);
            }
            input.value = "";
        };

        // Остальные функции (Profile, Chat, Auth) остаются без изменений как в v0.7
        async function openChat(email) {
            if (!email) return;
            currentPeer = email.toLowerCase().trim();
            lastRenderedDate = null;
            document.body.classList.add('chat-open');
            const name = await getProfileName(currentPeer);
            document.getElementById('chat-title').innerText = name;
            document.getElementById('header-av').innerText = name[0];
            document.getElementById('messages').innerHTML = "";
            const { data } = await _sup.from('messages')
                .select('*').or(`and(author_email.eq.${myEmail},receiver_email.eq.${currentPeer}),and(author_email.eq.${currentPeer},receiver_email.eq.${myEmail})`)
                .order('created_at', { ascending: true });
            if (data) data.forEach(render);
        }

        async function loadHistory() {
            const { data: msgs } = await _sup.from('messages').select('author_email, receiver_email').or(`author_email.eq.${myEmail},receiver_email.eq.${myEmail}`).order('created_at', {ascending: false});
            if (!msgs) return;
            const emails = [...new Set(msgs.map(m => m.author_email.toLowerCase() === myEmail ? m.receiver_email.toLowerCase() : m.author_email.toLowerCase()))];
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            for (const email of emails) {
                const name = await getProfileName(email);
                const item = document.createElement('div');
                item.className = `chat-item ${currentPeer === email ? 'active' : ''}`;
                item.innerHTML = `<div class="avatar">${name[0]}</div><div style="font-weight:600; font-size:14px;">${name}</div>`;
                item.onclick = () => openChat(email);
                list.appendChild(item);
            }
        }

        async function getProfileName(email) {
            if (profileCache[email]) return profileCache[email];
            const { data } = await _sup.from('user_profiles').select('display_name').eq('email', email).maybeSingle();
            const name = data?.display_name || email.split('@')[0];
            profileCache[email] = name;
            return name;
        }

        function renderDateDivider(dateStr) {
            const date = new Date(dateStr).toLocaleDateString();
            if (lastRenderedDate !== date) {
                lastRenderedDate = date;
                const div = document.createElement('div');
                div.className = 'date-divider';
                div.innerText = date === new Date().toLocaleDateString() ? "Сегодня" : date;
                document.getElementById('messages').appendChild(div);
            }
        }

        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-pass').value;
            let res = type === 'register' ? await _sup.auth.signUp({ email, password }) : await _sup.auth.signInWithPassword({ email, password });
            if (res.error) alert(res.error.message); else location.reload();
        }

        function goBack() { document.body.classList.remove('chat-open'); currentPeer = null; }
        function logout() { _sup.auth.signOut(); location.reload(); }

        init();
    </script>
</body>
</html>
