<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luminous</title>
    <style>
        /* ТВОЙ ДИЗАЙН */
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #25272D; color: #fff; height: 100dvh; display: flex; overflow: hidden; }
        
        #sidebar { width: 300px; background: #25272D; border-right: 1px solid rgba(0,0,0,0.2); display: flex; flex-direction: column; }
        #main-chat { flex-grow: 1; display: flex; flex-direction: column; background: #2E3037; position: relative; }
        
        /* КНОПКИ ЗВОНКА (НОВОЕ) */
        #call-overlay {
            position: fixed; inset: 0; background: #141517; z-index: 50000;
            display: none; flex-direction: column; align-items: center; justify-content: space-around; padding: 40px;
        }
        .call-btn { width: 70px; height: 70px; border-radius: 50%; border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-accept { background: #2ecc71; }
        .btn-decline { background: #e74c3c; }
        .btn-mute { background: #565C69; width: 50px; height: 50px; margin-top: 20px; }
        .muted { background: #ff9f43 !important; }

        /* СТАРЫЕ МЕХАНИКИ ЧАТА */
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; }
        .msg.mine { align-self: flex-end; background: #7058c9; }
        .msg.theirs { align-self: flex-start; background: #191a1d; }
        
        #call-icon { font-size: 22px; cursor: pointer; margin-left: 15px; display: none; color: #2ecc71; }
        
        /* ТВОИ ПАНЕЛИ */
        #auth-overlay { position: fixed; inset: 0; background: #1E1F23; z-index: 10000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body onclick="unlockAudio()">

    <div id="auth-overlay">
        <div style="background: #2E3037; padding: 30px; border-radius: 20px; text-align: center;">
            <h2 style="color: #7058c9;">Luminous</h2>
            <input type="email" id="ae" placeholder="Email" style="display:block; width:100%; margin-bottom:10px; padding:10px;">
            <input type="password" id="ap" placeholder="Пароль" style="display:block; width:100%; margin-bottom:10px; padding:10px;">
            <button onclick="auth('login')" style="width:100%; padding:10px; background:#7058c9; border:none; color:#fff;">Войти</button>
        </div>
    </div>

    <div id="call-overlay">
        <div style="text-align: center;">
            <div id="ca" style="width:120px; height:120px; border-radius:50%; background:#7058c9; display:flex; align-items:center; justify-content:center; font-size:40px; margin:0 auto;">👤</div>
            <h2 id="cn">User</h2>
            <p id="cs">Звонок...</p>
            <button id="mb" class="call-btn btn-mute" onclick="toggleMic()" style="display:none; margin: 20px auto;">🎤</button>
        </div>
        <div style="display: flex; gap: 30px;">
            <button class="call-btn btn-decline" onclick="endCall()">✖</button>
            <button class="call-btn btn-accept" id="ab" onclick="acceptCall()">📞</button>
        </div>
        <audio id="rt" loop src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3"></audio>
    </div>

    <div id="sidebar">
        <div style="padding: 15px; font-weight: bold; color: #7058c9;">Luminous</div>
        <input id="si" placeholder="Поиск..." onkeyup="if(event.key==='Enter') openChat(this.value)" style="margin:10px; padding:8px; background:#1a1b1e; border:none; color:#fff;">
        <div id="cl" style="flex-grow:1; overflow-y:auto;"></div>
    </div>

    <div id="main-chat">
        <div id="chat-header" style="padding:15px; background:#25272D; display:flex; align-items:center;">
            <div id="ct" style="flex-grow:1; font-weight:bold;">Выберите чат</div>
            <div id="call-icon" onclick="startCall()">📞</div>
        </div>
        <div id="messages"></div>
        <form id="mf" style="padding:15px; display:flex; gap:10px;" onsubmit="sendMsg(event)">
            <input id="mi" placeholder="Сообщение..." style="flex-grow:1; background:#1a1b1e; border:none; color:#fff; padding:12px; border-radius:10px;">
            <button style="background:none; border:none; color:#7058c9; font-size:24px;">➤</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _sup = supabase.createClient('https://rlbrnsjluipocxommmvx.supabase.co', 'sb_publishable_p_5nubdUTK9RUqIcosNRlQ_M2wM9VeG');
        
        let myEmail = "", peer = null, callId = null, localStream = null, isMuted = false;

        async function init() {
            const { data: { session } } = await _sup.auth.getSession();
            if (!session) { document.getElementById('auth-overlay').style.display = 'flex'; return; }
            
            myEmail = session.user.email.toLowerCase().trim();
            document.getElementById('auth-overlay').style.display = 'none';

            // ПОДПИСКА НА СООБЩЕНИЯ (Старая механика)
            _sup.channel('m').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
                if (p.new.receiver_email === myEmail || p.new.author_email === myEmail) {
                    if (peer === p.new.author_email || peer === p.new.receiver_email) render(p.new);
                    loadList();
                }
            }).subscribe();

            // ПОДПИСКА НА ЗВОНКИ (Новая механика)
            _sup.channel('c').on('postgres_changes', { event: '*', schema: 'public', table: 'calls' }, p => {
                const c = p.new;
                if (p.eventType === 'INSERT' && c.receiver_email === myEmail) {
                    callId = c.id;
                    showCallUI(c.caller_email, 'in');
                }
                if (p.eventType === 'UPDATE' && c.id === callId) {
                    if (c.status === 'active') activateMic();
                    if (c.status === 'ended' || c.status === 'rejected') hideCallUI();
                }
            }).subscribe();

            loadList();
        }

        // --- МИКРОФОН И ЗВУК ---
        async function activateMic() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('cs').innerText = "В эфире";
                document.getElementById('rt').pause();
                document.getElementById('mb').style.display = 'block';
            } catch (e) { console.log("Микрофон заблокирован"); }
        }

        function toggleMic() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            const btn = document.getElementById('mb');
            btn.innerText = isMuted ? "🔇" : "🎤";
            btn.classList.toggle('muted', isMuted);
        }

        function unlockAudio() {
            const r = document.getElementById('rt');
            r.play().then(() => { r.pause(); r.currentTime = 0; });
        }

        // --- ЗВОНКИ ---
        async function startCall() {
            const { data } = await _sup.from('calls').insert([{
                caller_email: myEmail, receiver_email: peer, status: 'ringing'
            }]).select().single();
            callId = data.id;
            showCallUI(peer, 'out');
        }

        async function acceptCall() {
            await _sup.from('calls').update({ status: 'active' }).eq('id', callId);
        }

        async function endCall() {
            if (callId) await _sup.from('calls').update({ status: 'ended' }).eq('id', callId);
            hideCallUI();
        }

        function showCallUI(e, type) {
            document.getElementById('cn').innerText = e;
            document.getElementById('call-overlay').style.display = 'flex';
            if (type === 'in') {
                document.getElementById('ab').style.display = 'flex';
                document.getElementById('rt').play().catch(()=>{});
            } else {
                document.getElementById('ab').style.display = 'none';
            }
        }

        function hideCallUI() {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            document.getElementById('call-overlay').style.display = 'none';
            document.getElementById('rt').pause();
            callId = null; isMuted = false;
        }

        // --- ЧАТ (ВОЗВРАЩЕНО) ---
        async function openChat(e) {
            peer = e.toLowerCase().trim();
            document.getElementById('ct').innerText = peer;
            document.getElementById('call-icon').style.display = 'block';
            const { data } = await _sup.from('messages').select('*').or(`and(author_email.eq.${myEmail},receiver_email.eq.${peer}),and(author_email.eq.${peer},receiver_email.eq.${myEmail})`).order('created_at');
            document.getElementById('messages').innerHTML = "";
            if (data) data.forEach(render);
        }

        async function loadList() {
            const { data } = await _sup.from('messages').select('author_email, receiver_email').or(`author_email.eq.${myEmail},receiver_email.eq.${myEmail}`);
            const peers = [...new Set(data.map(m => m.author_email === myEmail ? m.receiver_email : m.author_email))];
            const list = document.getElementById('cl'); list.innerHTML = "";
            peers.forEach(p => {
                const d = document.createElement('div'); d.style = "padding:10px; cursor:pointer;";
                d.innerText = p; d.onclick = () => openChat(p); list.appendChild(d);
            });
        }

        function render(m) {
            const d = document.createElement('div');
            d.className = `msg ${m.author_email === myEmail ? 'mine' : 'theirs'}`;
            d.innerText = m.text;
            document.getElementById('messages').appendChild(d);
            document.getElementById('messages').scrollTop = 9999;
        }

        async function sendMsg(e) {
            e.preventDefault(); const t = document.getElementById('mi').value;
            if (!t || !peer) return; document.getElementById('mi').value = "";
            await _sup.from('messages').insert([{ text: t, author_email: myEmail, receiver_email: peer }]);
        }

        async function auth(m) {
            const e = document.getElementById('ae').value; const p = document.getElementById('ap').value;
            await _sup.auth.signInWithPassword({email:e, password:p}); location.reload();
        }

        init();
    </script>
</body>
</html>
