<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luminous v0.7.1</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #25272D; color: #fff; height: 100dvh; display: flex; overflow: hidden; }

        /* АВТОРИЗАЦИЯ */
        #auth-overlay { position: fixed; inset: 0; background: #1E1F23; z-index: 10000; display: none; align-items: center; justify-content: center; }
        .auth-card { background: #2E3037; padding: 35px; border-radius: 24px; width: 340px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; border: none; background: #23242A; color: #fff; outline: none; font-size: 16px; }
        .auth-btn { width: 100%; padding: 12px; background: #7058c9; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .auth-secondary { background: transparent; color: #6EBDFD; border: 1px solid #6EBDFD; }

        /* МОДАЛКИ (Удаление, Фото) */
        #delete-modal, #photo-modal, #full-viewer { position: fixed; inset: 0; z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        #delete-modal { background: rgba(0,0,0,0.7); }
        #photo-modal { background: rgba(0, 0, 0, 0.9); flex-direction: column; }
        #full-viewer { background: rgba(0,0,0,0.95); z-index: 50000; }
        
        .delete-card, .modal-content { background: #2E3037; padding: 25px; border-radius: 24px; width: 100%; max-width: 340px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .modal-content { max-width: 450px; padding: 0; overflow: hidden; display: flex; flex-direction: column; }
        
        .del-btn-red { width: 100%; padding: 12px; background: #ff4d4d; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .del-btn-gray { width: 100%; padding: 12px; background: #3D3F46; color: white; border: none; border-radius: 12px; cursor: pointer; margin-bottom: 10px; }

        .modal-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .modal-body { padding: 15px; background: #1a1b1e; max-height: 60vh; overflow-y: auto; display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }
        .preview-item { position: relative; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; background: #23242A; border: 1px solid rgba(255,255,255,0.1); }
        .preview-item img, .preview-item video { width: 100%; height: 100%; object-fit: cover; }
        .modal-footer { padding: 15px 20px; background: #2E3037; display: flex; gap: 12px; align-items: center; }
        #modal-caption { background: #23242A; border: none; color: #fff; outline: none; flex-grow: 1; padding: 10px; border-radius: 12px; }

        /* ИНТЕРФЕЙС */
        #sidebar { width: 300px; background: #25272D; border-right: 1px solid rgba(0,0,0,0.2); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 10px; background: #252935; display: flex; align-items: center; gap: 10px; border-radius: 10px; margin: 5px; }
        #search-input { background: #33353B; border: none; border-radius: 40px; color: #fff; outline: none; padding: 8px 15px; flex-grow: 1; font-size: 14px; }
        #chat-list { overflow-y: auto; flex-grow: 1; padding: 10px; }

        .chat-item { border-radius: 15px; margin-bottom: 8px; padding: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .chat-item.active { background: #34373F !important; border: 1px solid #565C69; }

        #main-chat { flex-grow: 1; display: flex; flex-direction: column; background: #2E3037; position: relative; }
        #chat-header { padding: 10px 20px; background: #25272D; display: flex; align-items: center; gap: 12px; height: 60px; margin: 5px; border-radius: 10px; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

        .date-divider { align-self: center; background: rgba(0,0,0,0.2); color: #BAC1F3; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin: 15px 0; }
        .msg { width: fit-content; min-width: 80px; max-width: 85%; padding: 10px 14px; font-size: 15px; word-wrap: break-word; display: flex; flex-direction: column; }
        .msg-info { font-size: 10px; opacity: 0.5; margin-top: 4px; align-self: flex-end; display: flex; gap: 4px; }
        .msg-theirs { align-self: flex-start; background: #191a1d; border-radius: 18px 18px 18px 4px; }
        .msg-mine { align-self: flex-end; background: #7058c9; border-radius: 18px 18px 4px 18px; }

        /* СЕТКА ФОТО */
        .photo-grid { display: grid; gap: 4px; margin-bottom: 6px; border-radius: 12px; overflow: hidden; width: 100%; max-width: 320px; }
        .photo-grid img, .photo-grid video { width: 100%; height: 160px; object-fit: cover; cursor: pointer; background: rgba(0,0,0,0.1); }
        .grid-1 img, .grid-1 video { height: auto; max-height: 300px; object-fit: contain; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr; }
        .grid-3 *:first-child { grid-column: span 2; height: 180px; }
        .grid-4 { grid-template-columns: 1fr 1fr; }

        .input-area { padding: 10px 20px; display: flex; align-items: center; gap: 12px; background: #2E3037; }
        .input-wrapper { background: #23242A; flex-grow: 1; border-radius: 15px; padding: 12px 15px; display: flex; align-items: center; gap: 15px; }
        #input { background: none; border: none; color: #fff; outline: none; flex-grow: 1; font-size: 16px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #E0E2E5; color: #444; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; text-transform: uppercase; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; height: 100%; z-index: 10; }
            #main-chat { width: 100%; position: absolute; height: 100%; z-index: 20; transform: translateX(100%); transition: 0.25s ease; }
            body.chat-open #main-chat { transform: translateX(0); }
            #back-mobile { display: block !important; }
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color: #BAC1F3; margin-bottom: 20px;">Luminous</h2>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button onclick="handleAuth('login')" class="auth-btn">Войти</button>
            <button onclick="handleAuth('register')" class="auth-btn auth-secondary">Регистрация</button>
            <p id="auth-error" style="color: #ff5e5e; font-size: 12px; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div id="photo-modal">
        <div class="modal-content">
            <div class="modal-header"><b>Отправить файлы</b><span onclick="cancelFile()" style="cursor:pointer; font-size:24px;">×</span></div>
            <div class="modal-body" id="modal-preview-container"></div>
            <div class="modal-footer">
                <input id="modal-caption" placeholder="Подпись..." autocomplete="off">
                <button onclick="sendWithFile()" class="auth-btn" style="width:auto; margin:0; padding:10px 20px;">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <div id="delete-modal" onclick="closeDeleteModal()">
        <div class="delete-card" onclick="event.stopPropagation()">
            <h3 style="color:#fff;">Удалить чат?</h3>
            <p id="delete-info" style="color:#8E94A5; font-size:14px;"></p>
            <button id="del-only-me" class="del-btn-gray">Только у меня</button>
            <button id="del-both" class="del-btn-red">У обоих</button>
        </div>
    </div>

    <div id="full-viewer" onclick="this.style.display='none'"><div id="viewer-content"></div></div>

    <div id="sidebar">
        <div class="sidebar-header">
            <input id="search-input" placeholder="Email пользователя..." onkeyup="if(event.key==='Enter') openChat(this.value)">
        </div>
        <div id="chat-list"></div>
    </div>

    <div id="main-chat">
        <div id="chat-header">
            <div onclick="goBack()" style="cursor:pointer; font-size:24px; display:none;" id="back-mobile">‹&nbsp;</div>
            <div class="avatar" id="header-av">?</div>
            <div id="chat-title" style="font-weight:600;">Luminous</div>
            <div onclick="logout()" style="margin-left:auto; cursor:pointer; opacity:0.5; font-size:12px;">Выйти</div>
        </div>
        <div id="messages"></div>
        <form class="input-area" id="msg-form">
            <div class="input-wrapper">
                <input id="input" placeholder="Cообщение..." autocomplete="off">
                <label for="file-input" style="cursor:pointer; font-size:20px; transform:rotate(45deg);">📎</label>
                <input type="file" id="file-input" style="display:none" multiple>
            </div>
            <button type="submit" style="background:none; border:none; color:#6EBDFD; font-size:28px; cursor:pointer;">➤</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _sup = supabase.createClient('https://rlbrnsjluipocxommmvx.supabase.co', 'sb_publishable_p_5nubdUTK9RUqIcosNRlQ_M2wM9VeG');
        let myEmail = "", currentPeer = null, lastRenderedDate = null, chatToDelete = null;

        async function init() {
            const { data: { session } } = await _sup.auth.getSession();
            if (session) {
                myEmail = session.user.email.toLowerCase().trim();
                document.getElementById('auth-overlay').style.display = 'none';
                
                _sup.channel('messages-realtime').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    const m = payload.new;
                    if ((m.author_email === myEmail && m.receiver_email === currentPeer) || (m.author_email === currentPeer && m.receiver_email === myEmail)) render(m);
                    loadHistory();
                }).subscribe();
                loadHistory();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
            }
        }

        async function openChat(email) {
            if (!email) return;
            email = email.toLowerCase().trim();

            // Исправленная проверка профиля
            const { data: profiles, error } = await _sup.from('user_profiles').select('display_name').eq('email', email);
            
            if (error || !profiles || profiles.length === 0) {
                alert("Пользователь не найден. Убедитесь, что он зарегистрирован.");
                return;
            }

            currentPeer = email;
            lastRenderedDate = null;
            document.body.classList.add('chat-open');
            const name = profiles[0].display_name || email.split('@')[0];
            document.getElementById('chat-title').innerText = name;
            document.getElementById('header-av').innerText = name[0];
            document.getElementById('messages').innerHTML = "";

            const { data: history } = await _sup.from('messages')
                .select('*')
                .or(`and(author_email.eq.${myEmail},receiver_email.eq.${currentPeer}),and(author_email.eq.${currentPeer},receiver_email.eq.${myEmail})`)
                .order('created_at', { ascending: true });
            
            if (history) history.forEach(render);
            loadHistory();
        }

        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-pass').value;
            let res = type === 'register' ? await _sup.auth.signUp({ email, password }) : await _sup.auth.signInWithPassword({ email, password });
            if (res.error) {
                document.getElementById('auth-error').innerText = res.error.message;
                document.getElementById('auth-error').style.display = 'block';
            } else location.reload();
        }

        async function loadHistory() {
            const { data: msgs } = await _sup.from('messages').select('author_email, receiver_email').or(`author_email.eq.${myEmail},receiver_email.eq.${myEmail}`).order('created_at', {ascending: false});
            if (!msgs) return;
            const hidden = JSON.parse(localStorage.getItem('hidden_chats') || "[]");
            const emails = [...new Set(msgs.map(m => m.author_email.toLowerCase() === myEmail ? m.receiver_email.toLowerCase() : m.author_email.toLowerCase()))].filter(e => !hidden.includes(e));
            
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            for (const email of emails) {
                const item = document.createElement('div');
                item.className = `chat-item ${currentPeer === email ? 'active' : ''}`;
                item.innerHTML = `<div class="avatar">${email[0]}</div><div style="font-size:14px; font-weight:600;">${email.split('@')[0]}</div>`;
                item.onclick = () => openChat(email);
                item.oncontextmenu = (e) => { e.preventDefault(); openDeleteMenu(email); };
                list.appendChild(item);
            }
        }

        function render(m) {
            const date = new Date(m.created_at).toLocaleDateString();
            if (lastRenderedDate !== date) {
                lastRenderedDate = date;
                const d = document.createElement('div'); d.className = 'date-divider'; d.innerText = date;
                document.getElementById('messages').appendChild(d);
            }
            const isMine = m.author_email.toLowerCase() === myEmail;
            const div = document.createElement('div');
            div.className = `msg ${isMine ? 'msg-mine' : 'msg-theirs'}`;
            
            let fHtml = "";
            if (m.file_url && m.file_url.length > 0) {
                fHtml = `<div class="photo-grid grid-${Math.min(m.file_url.length, 4)}">`;
                m.file_url.forEach(url => {
                    const u = url.replace(/[{}"]/g, "");
                    if (u.match(/\.(mp4|webm|mov)/i)) fHtml += `<video src="${u}" onclick="event.stopPropagation(); openFullView('${u}',true)" muted onmouseover="this.play()" onmouseout="this.pause()"></video>`;
                    else fHtml += `<img src="${u}" onclick="openFullView('${u}',false)">`;
                });
                fHtml += `</div>`;
            }
            
            const time = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            div.innerHTML = `${fHtml}${m.text ? `<div>${m.text}</div>` : ""}<div class="msg-info">${time} ${isMine?'✓':''}</div>`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        document.getElementById('file-input').onchange = (e) => {
            const container = document.getElementById('modal-preview-container');
            container.innerHTML = "";
            Array.from(e.target.files).forEach(file => {
                const url = URL.createObjectURL(file);
                const item = document.createElement('div'); item.className="preview-item";
                item.innerHTML = file.type.startsWith('image/') ? `<img src="${url}">` : `<video src="${url}"></video>`;
                container.appendChild(item);
            });
            document.getElementById('photo-modal').style.display = 'flex';
        };

        async function sendWithFile() {
            const files = document.getElementById('file-input').files;
            const text = document.getElementById('modal-caption').value;
            const urls = [];
            for (let f of files) {
                const path = `${Date.now()}_${f.name}`;
                const { data } = await _sup.storage.from('uploads').upload(path, f);
                if (data) urls.push(_sup.storage.from('uploads').getPublicUrl(path).data.publicUrl);
            }
            await _sup.from('messages').insert([{ text, author_email: myEmail, receiver_email: currentPeer, file_url: urls }]);
            cancelFile();
        }

        function cancelFile() { document.getElementById('file-input').value=""; document.getElementById('photo-modal').style.display='none'; }
        function openFullView(u, v) { 
            const c = document.getElementById('viewer-content');
            c.innerHTML = v ? `<video src="${u}" controls autoplay style="max-width:100%; max-height:90vh;"></video>` : `<img src="${u}" style="max-width:100%; max-height:90vh;">`;
            document.getElementById('full-viewer').style.display='flex';
        }

        function openDeleteMenu(e) { chatToDelete = e; document.getElementById('delete-info').innerText = e; document.getElementById('delete-modal').style.display='flex'; }
        async function confirmDelete(mode) { /* механика удаления осталась прежней */ }
        function closeDeleteModal() { document.getElementById('delete-modal').style.display='none'; }
        function goBack() { document.body.classList.remove('chat-open'); currentPeer=null; }
        function logout() { _sup.auth.signOut(); location.reload(); }
        document.getElementById('msg-form').onsubmit = async (e) => {
            e.preventDefault();
            const i = document.getElementById('input');
            if (i.value.trim() && currentPeer) {
                const text = i.value; i.value = "";
                await _sup.from('messages').insert([{ text, author_email: myEmail, receiver_email: currentPeer }]);
            }
        };
        init();
    </script>
</body>
</html>
