<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Luminous v0.8 - Control Update</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #25272D; color: #fff; height: 100dvh; display: flex; overflow: hidden; }

        /* ОКНО РЕГИСТРАЦИИ */
        #auth-overlay { position: fixed; inset: 0; background: #1E1F23; z-index: 10000; display: none; align-items: center; justify-content: center; }
        .auth-card { background: #2E3037; padding: 35px; border-radius: 24px; width: 340px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; border: none; background: #23242A; color: #fff; outline: none; font-size: 16px; }
        .auth-btn { width: 100%; padding: 12px; background: #7058c9; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .auth-secondary { background: transparent; color: #6EBDFD; border: 1px solid #6EBDFD; }

        /* СИСТЕМА КОНТЕКСТНОГО МЕНЮ И РАЗМЫТИЯ */
        #overlay-blur {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 40000; display: none; opacity: 0; transition: opacity 0.2s;
        }
        .active-msg-focus { z-index: 40001 !important; position: relative !important; }

        #msg-context-menu {
            position: fixed; z-index: 40002; display: none; width: 220px;
            background: rgba(46, 48, 55, 0.95); backdrop-filter: blur(20px);
            border-radius: 18px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden;
        }
        .context-item {
            padding: 12px 16px; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: space-between;
            transition: background 0.2s; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .context-item:last-child { border-bottom: none; }
        .context-item:active, .context-item:hover { background: rgba(255,255,255,0.1); }
        .context-item.danger { color: #ff5e5e; }

        /* МОДАЛКА УДАЛЕНИЯ */
        #delete-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .delete-card { background: #2E3037; padding: 25px; border-radius: 24px; width: 100%; max-width: 340px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .del-btn-red { width: 100%; padding: 12px; background: #ff4d4d; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .del-btn-gray { width: 100%; padding: 12px; background: #3D3F46; color: white; border: none; border-radius: 12px; cursor: pointer; margin-bottom: 10px; }

        /* ДИЗАЙН САЙТА (БЕЗ ИЗМЕНЕНИЙ) */
        #sidebar { width: 300px; background: #25272D; border-right: 1px solid rgba(0,0,0,0.2); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 10px; background: #252935; display: flex; align-items: center; gap: 10px; border-radius: 10px; margin: 5px; }
        #search-input { background: #33353B; border: none; border-radius: 40px; color: #fff; outline: none; padding: 8px 15px; flex-grow: 1; font-size: 14px; }
        #chat-list { overflow-y: auto; flex-grow: 1; padding: 10px; }
        .chat-item { background: transparent; border-radius: 15px; margin-bottom: 8px; padding: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
        .chat-item.active { background: #34373F !important; border: 1px solid #565C69; }

        #main-chat { flex-grow: 1; display: flex; flex-direction: column; background: #2E3037; position: relative; }
        #chat-header { padding: 10px 20px; background: #25272D; display: flex; align-items: center; gap: 12px; height: 60px; margin: 5px; border-radius: 10px; }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

        .msg { 
            width: fit-content; min-width: 80px; max-grow: 0; max-width: 85%; padding: 10px 14px; font-size: 15px; 
            word-wrap: break-word; display: flex; flex-direction: column; position: relative; transition: transform 0.2s;
            user-select: none; -webkit-user-select: none;
        }
        .msg-info { font-size: 10px; opacity: 0.5; margin-top: 4px; align-self: flex-end; display: flex; gap: 4px; align-items: center; }
        .msg-theirs { align-self: flex-start; background: #191a1d; border-radius: 18px 18px 18px 4px; }
        .msg-mine { align-self: flex-end; background: #7058c9; border-radius: 18px 18px 4px 18px; }

        /* СЕТКА ФАЙЛОВ */
        .photo-grid { display: grid; gap: 4px; margin-bottom: 6px; border-radius: 12px; overflow: hidden; width: 100%; max-width: 320px; }
        .photo-grid img, .photo-grid video { width: 100%; height: 160px; object-fit: cover; cursor: pointer; display: block; }

        .input-area { padding: 10px 20px; display: flex; align-items: center; gap: 12px; background: #2E3037; }
        .input-wrapper { background: #23242A; flex-grow: 1; border-radius: 15px; padding: 12px 15px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
        #input { background: none; border: none; color: #fff; outline: none; flex-grow: 1; font-size: 16px; }
        .send-btn { color: #6EBDFD; font-size: 28px; cursor: pointer; background: none; border: none; transition: 0.2s; }
        .edit-mode-active .input-wrapper { border: 1px solid #7058c9; }

        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #E0E2E5; color: #444; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; text-transform: uppercase; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; height: 100%; z-index: 10; }
            #main-chat { width: 100%; position: absolute; height: 100%; z-index: 20; transform: translateX(100%); transition: 0.25s ease; }
            body.chat-open #main-chat { transform: translateX(0); }
            #back-mobile { display: block !important; }
        }
    </style>
</head>
<body>

    <div id="overlay-blur" onclick="closeContextMenu()"></div>
    <div id="msg-context-menu"></div>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color: #BAC1F3; margin-bottom: 20px;">Luminous</h2>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Пароль">
            <button onclick="handleAuth('login')" class="auth-btn">Войти</button>
            <button onclick="handleAuth('register')" class="auth-btn auth-secondary">Регистрация</button>
            <p id="auth-error" style="color: #ff5e5e; font-size: 12px; margin-top: 10px; display: none;"></p>
        </div>
    </div>

    <div id="delete-modal" onclick="closeDeleteModal()">
        <div class="delete-card" onclick="event.stopPropagation()">
            <h3 id="del-title" style="margin-top: 0; color: #fff;">Удалить?</h3>
            <p id="del-desc" style="color: #8E94A5; font-size: 14px; margin-bottom: 20px;"></p>
            <button id="del-btn-me" class="del-btn-gray">Только у меня</button>
            <button id="del-btn-both" class="del-btn-red">У обоих</button>
            <button onclick="closeDeleteModal()" style="background:none; border:none; color:#8E94A5; cursor:pointer; width:100%; padding:10px;">Отмена</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <div class="menu-btn" style="cursor:pointer; opacity:0.6;">☰</div>
            <input id="search-input" placeholder="Search" onkeyup="if(event.key==='Enter') openChat(this.value)">
            <div style="color: #BAC1F3; font-weight: bold; font-size: 14px; margin-left: auto;">Luminous</div>
        </div>
        <div id="chat-list"></div>
    </div>

    <div id="main-chat">
        <div id="chat-header">
            <div onclick="goBack()" style="cursor:pointer; font-size:24px; display:none; padding-right:10px;" id="back-mobile">‹</div>
            <div class="avatar" id="header-av">?</div>
            <div id="chat-title" style="font-weight:600;">Выберите собеседника</div>
            <div onclick="logout()" style="margin-left: auto; cursor: pointer; opacity: 0.5; font-size: 12px;">Выйти</div>
        </div>
        <div id="messages"></div>
        <form class="input-area" id="msg-form">
            <div class="input-wrapper">
                <div id="cancel-edit" style="display:none; cursor:pointer; color:#ff5e5e; font-weight:bold;">✕</div>
                <input id="input" placeholder="Message" autocomplete="off">
                <label for="file-input" style="font-size: 20px; cursor: pointer; transform: rotate(45deg); opacity: 0.7;">📎</label>
                <input type="file" id="file-input" style="display:none" multiple>
            </div>
            <button type="submit" class="send-btn" id="send-btn">➤</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _sup = supabase.createClient('https://rlbrnsjluipocxommmvx.supabase.co', 'sb_publishable_p_5nubdUTK9RUqIcosNRlQ_M2wM9VeG');

        let myEmail = "", currentPeer = null, profileCache = {};
        let pressTimer = null, editingMsgId = null, selectedMsgData = null;

        async function init() {
            const { data: { session } } = await _sup.auth.getSession();
            if (session) {
                myEmail = session.user.email.toLowerCase().trim();
                document.getElementById('auth-overlay').style.display = 'none';
                
                _sup.channel('messages-realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, payload => {
                    if (payload.eventType === 'INSERT') {
                        if (isCurrentChat(payload.new)) render(payload.new);
                    } else if (payload.eventType === 'UPDATE') {
                        const el = document.getElementById(`msg-${payload.new.id}`);
                        if (el) updateMsgElement(el, payload.new);
                    } else if (payload.eventType === 'DELETE') {
                        document.getElementById(`msg-${payload.old.id}`)?.remove();
                    }
                    loadHistory();
                }).subscribe();

                loadHistory();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
            }
        }

        const isCurrentChat = (m) => (m.author_email === myEmail && m.receiver_email === currentPeer) || (m.author_email === currentPeer && m.receiver_email === myEmail);

        // КОНТЕКСТНОЕ МЕНЮ
        function showContextMenu(e, msgData) {
            e.preventDefault();
            selectedMsgData = msgData;
            const menu = document.getElementById('msg-context-menu');
            const overlay = document.getElementById('overlay-blur');
            const msgEl = document.getElementById(`msg-${msgData.id}`);

            // Подсветка сообщения
            msgEl.classList.add('active-msg-focus');
            overlay.style.display = 'block';
            setTimeout(() => overlay.style.opacity = '1', 10);

            // Позиционирование меню
            let x = e.clientX || (e.touches ? e.touches[0].clientX : 100);
            let y = e.clientY || (e.touches ? e.touches[0].clientY : 100);

            menu.innerHTML = `
                <div class="context-item" onclick="copyMsgText('${msgData.text}')">Копировать <span>📋</span></div>
                ${msgData.author_email === myEmail ? `<div class="context-item" onclick="startEditMsg()">Изменить <span>✏️</span></div>` : ''}
                <div class="context-item danger" onclick="prepDeleteMsg()">Удалить <span>🗑️</span></div>
            `;

            menu.style.display = 'block';
            // Ограничение, чтобы не выходило за края
            if (x + 220 > window.innerWidth) x -= 220;
            if (y + 150 > window.innerHeight) y -= 150;
            
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
        }

        function closeContextMenu() {
            document.getElementById('msg-context-menu').style.display = 'none';
            document.getElementById('overlay-blur').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay-blur').style.display = 'none', 200);
            document.querySelectorAll('.msg').forEach(m => m.classList.remove('active-msg-focus'));
        }

        function copyMsgText(text) {
            navigator.clipboard.writeText(text);
            closeContextMenu();
        }

        function startEditMsg() {
            editingMsgId = selectedMsgData.id;
            const input = document.getElementById('input');
            input.value = selectedMsgData.text;
            input.focus();
            document.body.classList.add('edit-mode-active');
            document.getElementById('cancel-edit').style.display = 'block';
            document.getElementById('send-btn').innerText = '✓';
            closeContextMenu();
        }

        document.getElementById('cancel-edit').onclick = () => {
            editingMsgId = null;
            document.getElementById('input').value = "";
            document.getElementById('cancel-edit').style.display = 'none';
            document.getElementById('send-btn').innerText = '➤';
            document.body.classList.remove('edit-mode-active');
        };

        function prepDeleteMsg() {
            closeContextMenu();
            document.getElementById('del-title').innerText = "Удалить сообщение?";
            document.getElementById('del-desc').innerText = "Это действие нельзя отменить.";
            document.getElementById('delete-modal').style.display = 'flex';
            document.getElementById('del-btn-me').style.display = 'none'; // Для сообщений только "у обоих"
            document.getElementById('del-btn-both').onclick = async () => {
                await _sup.from('messages').delete().eq('id', selectedMsgData.id);
                closeDeleteModal();
            };
        }

        function closeDeleteModal() { document.getElementById('delete-modal').style.display = 'none'; }

        // РЕНДЕР СООБЩЕНИЙ
        function render(m) {
            const isMine = m.author_email.toLowerCase() === myEmail;
            const div = document.createElement('div');
            div.id = `msg-${m.id}`;
            div.className = `msg ${isMine ? 'msg-mine' : 'msg-theirs'}`;
            
            updateMsgElement(div, m);

            // Обработчики нажатий
            div.oncontextmenu = (e) => showContextMenu(e, m);
            div.ontouchstart = (e) => {
                pressTimer = setTimeout(() => showContextMenu(e, m), 500);
            };
            div.ontouchend = () => clearTimeout(pressTimer);
            div.ontouchmove = () => clearTimeout(pressTimer);

            const msgBox = document.getElementById('messages');
            msgBox.appendChild(div);
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        function updateMsgElement(el, m) {
            const time = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const editedTag = m.is_edited ? `<span style="font-size:9px; margin-right:4px; opacity:0.6;">(изм.)</span>` : "";
            const tick = m.author_email === myEmail ? (m.is_read ? '✓✓' : '✓') : '';
            
            // Если есть файлы (сетка из v0.7)
            let fHtml = "";
            if (m.file_url) {
                const urls = Array.isArray(m.file_url) ? m.file_url : [m.file_url];
                fHtml = `<div class="photo-grid grid-${Math.min(urls.length, 4)}">`;
                urls.forEach(url => {
                    const cleanUrl = String(url).replace(/[{}"]/g, "").trim();
                    if (cleanUrl.match(/\.(mp4|webm|mov)/i)) fHtml += `<video src="${cleanUrl}" muted loop></video>`;
                    else fHtml += `<img src="${cleanUrl}">`;
                });
                fHtml += `</div>`;
            }

            el.innerHTML = `
                ${fHtml}
                <div style="white-space: pre-wrap;">${m.text || ""}</div>
                <div class="msg-info">
                    ${editedTag}
                    <span>${time}</span> 
                    <span style="font-weight:bold; color:#58BFFF;">${tick}</span>
                </div>
            `;
        }

        // ОТПРАВКА И РЕДАКТИРОВАНИЕ
        document.getElementById('msg-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text || !currentPeer) return;

            if (editingMsgId) {
                // Режим редактирования
                await _sup.from('messages').update({ text, is_edited: true }).eq('id', editingMsgId);
                document.getElementById('cancel-edit').click();
            } else {
                // Обычный режим
                await _sup.from('messages').insert([{ text, author_email: myEmail, receiver_email: currentPeer, is_read: false }]);
                input.value = "";
            }
        };

        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ (Сайдбар и т.д.)
        async function openChat(email) {
            email = email.toLowerCase().trim();
            currentPeer = email;
            document.body.classList.add('chat-open');
            const name = await getProfileName(email);
            document.getElementById('chat-title').innerText = name;
            document.getElementById('header-av').innerText = name[0];
            document.getElementById('messages').innerHTML = "";
            const { data } = await _sup.from('messages').select('*')
                .or(`and(author_email.eq.${myEmail},receiver_email.eq.${currentPeer}),and(author_email.eq.${currentPeer},receiver_email.eq.${myEmail})`)
                .order('created_at', { ascending: true });
            if (data) data.forEach(render);
            loadHistory();
        }

        async function loadHistory() {
            const { data } = await _sup.from('messages').select('author_email, receiver_email').or(`author_email.eq.${myEmail},receiver_email.eq.${myEmail}`).order('created_at', {ascending: false});
            if (!data) return;
            const emails = [...new Set(data.map(m => m.author_email === myEmail ? m.receiver_email : m.author_email))];
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            for (const email of emails) {
                const name = await getProfileName(email);
                const item = document.createElement('div');
                item.className = `chat-item ${currentPeer === email ? 'active' : ''}`;
                item.innerHTML = `<div class="avatar">${name[0]}</div><div>${name}</div>`;
                item.onclick = () => openChat(email);
                list.appendChild(item);
            }
        }

        async function getProfileName(email) {
            if (profileCache[email]) return profileCache[email];
            const { data } = await _sup.from('user_profiles').select('display_name').eq('email', email).maybeSingle();
            profileCache[email] = data?.display_name || email.split('@')[0];
            return profileCache[email];
        }

        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-pass').value;
            const { error } = type === 'register' ? await _sup.auth.signUp({ email, password }) : await _sup.auth.signInWithPassword({ email, password });
            if (error) {
                const errEl = document.getElementById('auth-error');
                errEl.innerText = error.message; errEl.style.display = 'block';
            } else location.reload();
        }

        function goBack() { document.body.classList.remove('chat-open'); currentPeer = null; }
        async function logout() { await _sup.auth.signOut(); location.reload(); }

        init();
    </script>
</body>
</html>
