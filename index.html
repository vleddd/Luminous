<!DOCTYPE html>
<html lang="ru">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #25272D; color: #fff; height: 100dvh; display: flex; overflow: hidden; }

        /* ОКНО РЕГИСТРАЦИИ */
        #auth-overlay { 
            position: fixed; inset: 0; background: #1E1F23; z-index: 10000; 
            display: none; align-items: center; justify-content: center; 
        }
        .auth-card { 
            background: #2E3037; padding: 35px; border-radius: 24px; width: 340px; 
            border: 1px solid rgba(255,255,255,0.1); text-align: center; 
        }
        .auth-input { 
            width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; 
            border: none; background: #23242A; color: #fff; outline: none; font-size: 16px; 
        }
        .auth-btn { 
            width: 100%; padding: 12px; background: #7058c9; color: white; border: none; 
            border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; 
        }
        .auth-secondary { background: transparent; color: #6EBDFD; border: 1px solid #6EBDFD; }

        /* МОДАЛКА УДАЛЕНИЯ */
        #delete-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 20000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .delete-card {
            background: #2E3037; padding: 25px; border-radius: 24px; width: 100%; max-width: 340px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
        }
        .del-btn-red { width: 100%; padding: 12px; background: #ff4d4d; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .del-btn-gray { width: 100%; padding: 12px; background: #3D3F46; color: white; border: none; border-radius: 12px; cursor: pointer; margin-bottom: 10px; }

        /* МОДАЛКА ПРЕДПРОСМОТРА */
        #photo-modal {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 30000;

        }
        .modal-content {
            background: #2E3037; border-radius: 24px; width: 100%; max-width: 450px;
            overflow: hidden; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1);
        }
        .modal-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .modal-body { 
            padding: 15px; 
            background: #1a1b1e; 
            max-height: 60vh; 
            overflow-y: auto; 
            display: grid; 
            gap: 10px; 
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); 
        }
        .preview-item {
            position: relative;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            overflow: hidden;
            background: #23242A;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-footer { padding: 15px 20px; background: #2E3037; display: flex; gap: 12px; align-items: center; }
        #modal-caption { background: #23242A; border: none; color: #fff; outline: none; flex-grow: 1; font-size: 16px; padding: 10px 15px; border-radius: 12px; }
        .modal-send-btn { background: #7058c9; color: white; border: none; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }

        /* ОКНО РЕДАКТИРОВАНИЯ МОЕГО ПРОФИЛЯ */
        #profile-overlay {
            position: fixed; inset: 0; background: #1E1F23; z-index: 40000;
            display: none; flex-direction: column;
        }
        .profile-header { padding: 15px 20px; display: flex; align-items: center; gap: 15px; background: #25272D; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .profile-avatar-big img { width: 100%; height: 100%; object-fit: cover; }
        .profile-section { width: 100%; max-width: 400px; background: #2E3037; border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .profile-label { font-size: 12px; color: #6EBDFD; margin-bottom: 5px; padding-left: 5px; }
        .profile-input { background: transparent; border: none; color: #fff; width: 100%; font-size: 16px; outline: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 5px; margin-bottom: 15px; }

        /* ОКНО ПРОСМОТРА ЧУЖОГО ПРОФИЛЯ (КАК НА СКРИНШОТЕ) */

        .sidebar-header { padding: 10px; background: #252935; display: flex; align-items: center; gap: 10px; border-radius: 10px; margin: 5px; }
        #search-input { background: #33353B; border: none; border-radius: 40px; color: #fff; outline: none; padding: 8px 15px; flex-grow: 1; font-size: 14px; }

        .chat-item {
            background: transparent; border-radius: 15px; margin-bottom: 8px; padding: 10px;

            user-select: none;
        }
        .chat-item.active { background: #34373F !important; border: 1px solid #565C69; }

        /* ОКНО ЧАТА */
        #main-chat { flex-grow: 1; display: flex; flex-direction: column; background: #2E3037; position: relative; }
        #chat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    
    /* ЦЕНТРИРОВАНИЕ: 5px сверху/снизу, auto слева/справа */
    margin: 5px auto; 

    /* Размеры */
    width: 600px; 
    height: 60px;

    /* Скругление */
    border-radius: 200px;

    /* Градиент */
    background: linear-gradient(90deg, 
        rgba(62, 63, 65, 0.6) 0%, 
        rgba(34, 36, 40, 0.6) 56%
    );

    /* Обводка */
    /* ВНИМАНИЕ: в CSS используется точка (0.8px), а не запятая */
    border: 0.8px solid #000000;
    box-sizing: border-box; 

    /* Эффект */
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
}
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

        .date-divider { align-self: center; background: rgba(0,0,0,0.2); color: #BAC1F3; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin: 15px 0; font-weight: 500; opacity: 0.8; }

        .msg-info { font-size: 10px; opacity: 0.5; margin-top: 4px; align-self: flex-end; display: flex; gap: 4px; }
        .msg-theirs { align-self: flex-start; background: #191a1d; border-radius: 18px 18px 18px 4px; }
        .msg-mine { align-self: flex-end; background: #7058c9; border-radius: 18px 18px 4px 18px; }

        /* СЕТКА ФОТО/ВИДЕО */
        .photo-grid { display: grid; gap: 4px; margin-bottom: 6px; border-radius: 12px; overflow: hidden; width: 100%; max-width: 320px; }
        .photo-grid img, .photo-grid video { width: 100%; height: 160px; object-fit: cover; cursor: pointer; display: block; background: rgba(0,0,0,0.1); }
        .grid-1 img, .grid-1 video { height: auto; max-height: 300px; object-fit: contain; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr; }
        .grid-3 *:first-child { grid-column: span 2; height: 180px; }
        .grid-4 { grid-template-columns: 1fr 1fr; }

        .input-area { padding: 10px 20px; display: flex; align-items: center; gap: 12px; background: #2E3037; }
        .input-wrapper { background: #23242A; flex-grow: 1; border-radius: 15px; padding: 12px 15px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
        #input { background: none; border: none; color: #fff; outline: none; flex-grow: 1; font-size: 16px; }
        .send-btn { color: #6EBDFD; font-size: 28px; cursor: pointer; background: none; border: none; display: flex; align-items: center; transition: 0.2s; }

        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #E0E2E5; color: #444; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; text-transform: uppercase; overflow: hidden; cursor: pointer; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; height: 100%; z-index: 10; }
            #main-chat { width: 100%; position: absolute; height: 100%; z-index: 20; transform: translateX(100%); transition: 0.25s ease; }
            body.chat-open #main-chat { transform: translateX(0); }
            .input-area { padding: 10px; }
            #back-mobile { display: block !important; }
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _sup = supabase.createClient('https://rlbrnsjluipocxommmvx.supabase.co', 'sb_publishable_p_5nubdUTK9RUqIcosNRlQ_M2wM9VeG');

        let myEmail = "", myId = "", currentPeer = null, profileCache = {}, lastRenderedDate = null, chatToDelete = null, pressTimer = null;

        const fileInput = document.getElementById('file-input');
        const photoModal = document.getElementById('photo-modal');
        const modalCaption = document.getElementById('modal-caption');
        const previewContainer = document.getElementById('modal-preview-container');

        async function init() {
            const { data: { session } } = await _sup.auth.getSession();
            if (session) {
                myEmail = session.user.email.toLowerCase().trim();
                myId = session.user.id;
                document.getElementById('auth-overlay').style.display = 'none';
                
                _sup.channel('messages-realtime')
                    .on('postgres_changes', { 
                        event: 'INSERT', 
                        schema: 'public', 
                        table: 'messages' 
                    }, payload => {
                        const m = payload.new;
                        if ((m.author_email === myEmail && m.receiver_email === currentPeer) || 
                            (m.author_email === currentPeer && m.receiver_email === myEmail)) {
                            render(m);
                        }
                        loadHistory(); 
                    })
                    .subscribe();

                loadHistory(); 
                loadMyProfile();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
            }
        }

        // --- ЛОГИКА ПРОФИЛЯ ---
        async function loadMyProfile() {
            const { data } = await _sup.from('user_profiles').select('*').eq('id', myId).maybeSingle();
            if (data) {
                document.getElementById('p-first-name').value = data.display_name || "";
                document.getElementById('p-last-name').value = data.last_name || "";
                document.getElementById('p-username').value = data.username ? `@${data.username.replace('@','')}` : "";
                document.getElementById('p-bio').value = data.bio || "";
                document.getElementById('p-birthday').value = data.birthday || "";
                
                if (data.avatar_url) {
                    document.getElementById('profile-av-img').src = data.avatar_url;
                    document.getElementById('profile-av-img').style.display = "block";
                    document.getElementById('profile-av-letter').style.display = "none";
                } else {
                    document.getElementById('profile-av-letter').innerText = (data.display_name || myEmail)[0];
                }
            }
        }

        async function saveProfile() {
            const dispName = document.getElementById('p-first-name').value.trim();
            const lName = document.getElementById('p-last-name').value.trim();
            const uName = document.getElementById('p-username').value.trim().replace('@', '');
            const bio = document.getElementById('p-bio').value.trim();
            const bday = document.getElementById('p-birthday').value.trim();

            const { error } = await _sup.from('user_profiles').upsert({
                id: myId,
                email: myEmail,
                display_name: dispName,
                last_name: lName,
                username: uName,
                bio: bio,
                birthday: bday,
                updated_at: new Date().toISOString()
            });

            if (error) alert("Ошибка: " + error.message);
            else {
                profileCache[myEmail] = { name: dispName };
                toggleProfile(false);
                loadHistory();
            }
        }

        // --- ПРОСМОТР ЧУЖИХ ПРОФИЛЕЙ ---
        async function openUserProfile(email) {
            if (!email) return;
            const { data: p, error } = await _sup.from('user_profiles').select('*').eq('email', email).maybeSingle();
            
            if (p) {
                document.getElementById('v-name').innerText = (p.display_name || 'User') + (p.last_name ? ' ' + p.last_name : '');
                document.getElementById('v-email').innerText = p.email;
                document.getElementById('v-username').innerText = p.username ? '@' + p.username : 'не указан';
                document.getElementById('v-bio').innerText = p.bio || 'Нет описания';
                document.getElementById('v-birthday').innerText = p.birthday || 'не указана';
                
                const vAv = document.getElementById('v-avatar');
                if (p.avatar_url) {
                    vAv.innerHTML = `<img src="${p.avatar_url}">`;
                } else {
                    vAv.innerText = (p.display_name || p.email)[0].toUpperCase();
                    vAv.style.background = '#7058c9';
                }
                document.getElementById('view-user-modal').style.display = 'flex';
            }
        }

        function closeUserModal() { document.getElementById('view-user-modal').style.display = 'none'; }
        function openCurrentPeerProfile() { if (currentPeer) openUserProfile(currentPeer); }

        async function getFullProfile(email) {
            if (profileCache[email]) return profileCache[email];
            const { data } = await _sup.from('user_profiles').select('*').eq('email', email).maybeSingle();
            const profile = {
                name: data ? (data.display_name || email.split('@')[0]) : email.split('@')[0],
                avatar: data ? data.avatar_url : null,
                username: data && data.username ? '@' + data.username : ''
            };
            profileCache[email] = profile;
            return profile;
        }

        async function uploadAvatar(input) {
            const file = input.files[0];
            if (!file) return;
            const ext = file.name.split('.').pop();
            const path = `avatars/${myId}_${Date.now()}.${ext}`;

            const { data, error } = await _sup.storage.from('uploads').upload(path, file, { upsert: true });
            if (error) return alert(error.message);

            const { data: { publicUrl } } = _sup.storage.from('uploads').getPublicUrl(path);
            
            await _sup.from('user_profiles').update({ avatar_url: publicUrl }).eq('id', myId);
            document.getElementById('profile-av-img').src = publicUrl;
            document.getElementById('profile-av-img').style.display = "block";
            document.getElementById('profile-av-letter').style.display = "none";
        }

        function toggleProfile(show) { document.getElementById('profile-overlay').style.display = show ? 'flex' : 'none'; }

        // --- ЧАТ И СООБЩЕНИЯ ---
        async function openChat(email) {
            if (!email) return;
            email = email.toLowerCase().trim();
            currentPeer = email;
            lastRenderedDate = null;
            
            document.body.classList.add('chat-open');
            const profile = await getFullProfile(email);
            document.getElementById('chat-title').innerText = profile.name;
            
            const headAv = document.getElementById('header-av');
            if (profile.avatar) {
                headAv.innerHTML = `<img src="${profile.avatar}">`;
            } else {
                headAv.innerText = profile.name[0].toUpperCase();
            }
            
            const msgContainer = document.getElementById('messages');
            msgContainer.innerHTML = "";
            
            const { data } = await _sup.from('messages')
                .select('*')
                .or(`and(author_email.eq.${myEmail},receiver_email.eq.${currentPeer}),and(author_email.eq.${currentPeer},receiver_email.eq.${myEmail})`)
                .order('created_at', { ascending: true });
            
            if (data) data.forEach(render);
            updateChatListUI();
        }

        async function sendMessage() {
            const input = document.getElementById('input');
            const val = input.value.trim();
            if (!val || !currentPeer) return;

            const msgText = val;
            input.value = "";

            const { error } = await _sup.from('messages').insert([{
                text: msgText,
                author_email: myEmail,
                receiver_email: currentPeer,
                sender_id: myId,
                created_at: new Date().toISOString()
            }]);
            if (error) console.error(error);
        }

        function render(m) {
            renderDateDivider(m.created_at);
            const isMine = m.author_email.toLowerCase() === myEmail;
            const div = document.createElement('div');
            div.className = `msg ${isMine ? 'msg-mine' : 'msg-theirs'}`;
            
            let fHtml = "";
            if (m.file_url) {
                const urls = Array.isArray(m.file_url) ? m.file_url : [m.file_url];
                if (urls.length > 0) {
                    fHtml = `<div class="photo-grid grid-${Math.min(urls.length, 4)}">`;
                    urls.forEach(url => {
                        const cleanUrl = String(url).replace(/[{}"]/g, "").trim();
                        const isVid = cleanUrl.match(/\.(mp4|webm|ogg|mov)/i);
                        if (isVid) fHtml += `<video src="${cleanUrl}" onclick="openFullView('${cleanUrl}', true)"></video>`;
                        else fHtml += `<img src="${cleanUrl}" onclick="openFullView('${cleanUrl}', false)">`;
                    });
                    fHtml += `</div>`;
                }
            }

            const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            div.innerHTML = `
                ${fHtml}
                ${m.text ? `<div class="msg-text">${m.text}</div>` : ''}
                <div class="msg-info">
                    <span>${time}</span>
                    ${isMine ? '<span style="font-size:8px;">✓✓</span>' : ''}
                </div>
            `;
            document.getElementById('messages').appendChild(div);
            const cont = document.getElementById('messages');
            cont.scrollTop = cont.scrollHeight;
        }

        function renderDateDivider(dateStr) {
            const date = new Date(dateStr).toLocaleDateString();
            if (lastRenderedDate !== date) {
                lastRenderedDate = date;
                const div = document.createElement('div');
                div.className = 'date-divider';
                div.innerText = date === new Date().toLocaleDateString() ? "Сегодня" : date;
                document.getElementById('messages').appendChild(div);
            }
        }

        async function loadHistory() {
            const { data: msgs } = await _sup.from('messages')
                .select('author_email, receiver_email, created_at')
                .or(`author_email.eq.${myEmail},receiver_email.eq.${myEmail}`)
                .order('created_at', {ascending: false});

            const list = document.getElementById('chat-list');
            if (!msgs) return;

            const hidden = JSON.parse(localStorage.getItem('hidden_chats') || "[]");
            const emails = [...new Set(msgs.map(m => m.author_email.toLowerCase() === myEmail ? m.receiver_email.toLowerCase() : m.author_email.toLowerCase()))]
                            .filter(e => !hidden.includes(e));

            list.innerHTML = "";
            for (const email of emails) {
                const profile = await getFullProfile(email);
                const item = document.createElement('div');
                item.className = `chat-item ${currentPeer === email ? 'active' : ''}`;
                item.setAttribute('data-email', email);
                
                const avHtml = profile.avatar ? `<img src="${profile.avatar}">` : profile.name[0].toUpperCase();
                
                item.innerHTML = `
                    <div class="avatar" onclick="event.stopPropagation(); openUserProfile('${email}')">${avHtml}</div>
                    <div style="flex-grow:1">
                        <div style="font-weight:600; font-size:14px;">${profile.name}</div>
                        <div style="font-size:11px; opacity:0.5">${profile.username || ''}</div>
                    </div>
                `;
                item.onclick = () => openChat(email);
                item.oncontextmenu = (e) => { e.preventDefault(); openDeleteMenu(email); };
                list.appendChild(item);
            }
        }

        // --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---
        function goBack() { document.body.classList.remove('chat-open'); currentPeer = null; updateChatListUI(); }
        
        async function searchUser(query) {
            if (!query) return;
            const cleanQuery = query.replace('@', '').trim();
            const { data } = await _sup.from('user_profiles')
                .select('email')
                .or(`username.eq.${cleanQuery},email.eq.${query.toLowerCase()}`)
                .maybeSingle();
            if (data) openChat(data.email);
            else openChat(query);
        }

        function updateChatListUI() {
            document.querySelectorAll('.chat-item').forEach(el => {
                el.classList.toggle('active', el.getAttribute('data-email') === currentPeer);
            });
        }

        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-pass').value;
            const errorEl = document.getElementById('auth-error');
            let res = type === 'register' 
                ? await _sup.auth.signUp({ email, password }) 
                : await _sup.auth.signInWithPassword({ email, password });

            if (res.error) {
                errorEl.innerText = res.error.message;
                errorEl.style.display = 'block';
            } else {
                location.reload();
            }
        }

        async function logout() { await _sup.auth.signOut(); location.reload(); }
        function cancelFile() { fileInput.value = ""; modalCaption.value = ""; photoModal.style.display = 'none'; }
        function openFullView(url, isVideo) {
            const viewer = document.getElementById('full-viewer');
            const content = document.getElementById('viewer-content');
            content.innerHTML = isVideo ? `<video src="${url}" controls autoplay></video>` : `<img src="${url}">`;
            viewer.style.display = 'flex';
        }

        function closeDeleteModal() { document.getElementById('delete-modal').style.display = 'none'; chatToDelete = null; }
        async function openDeleteMenu(email) {
            chatToDelete = email;
            const profile = await getFullProfile(email);
            document.getElementById('delete-info').innerText = `Чат с ${profile.name}`;
            document.getElementById('delete-modal').style.display = 'flex';
            document.getElementById('del-only-me').onclick = () => confirmDelete('me');
            document.getElementById('del-both').onclick = () => confirmDelete('both');
        }

        async function confirmDelete(mode) {
            if (!chatToDelete) return;
            if (mode === 'both') {
                await _sup.from('messages').delete().or(`and(author_email.eq.${myEmail},receiver_email.eq.${chatToDelete}),and(author_email.eq.${chatToDelete},receiver_email.eq.${myEmail})`);
            } else {
                let hidden = JSON.parse(localStorage.getItem('hidden_chats') || "[]");
                if(!hidden.includes(chatToDelete)) hidden.push(chatToDelete);
                localStorage.setItem('hidden_chats', JSON.stringify(hidden));
            }
            if (currentPeer === chatToDelete) goBack();
            closeDeleteModal();
            loadHistory();
        }

        fileInput.onchange = () => {
            const files = fileInput.files;
            if (files.length === 0) return;
            previewContainer.innerHTML = "";
            Array.from(files).forEach(file => {
                const url = URL.createObjectURL(file);
                const item = document.createElement('div');
                item.className = "preview-item";
                if (file.type.startsWith('image/')) item.innerHTML = `<img src="${url}">`;
                else if (file.type.startsWith('video/')) item.innerHTML = `<video src="${url}"></video>`;
                else item.innerHTML = `<div class="file-icon-label">📄<br>${file.name.split('.').pop().toUpperCase()}</div>`;
                previewContainer.appendChild(item);
            });
            photoModal.style.display = 'flex';
        };

        document.getElementById('modal-send-btn').onclick = async () => {
            const files = fileInput.files;
            const text = modalCaption.value.trim();
            if (files.length === 0 || !currentPeer) return;
            const btn = document.getElementById('modal-send-btn');
            btn.innerText = "ЗАГРУЗКА...";
            btn.disabled = true;

            try {
                let uploadedUrls = [];
                for (let file of files) {
                    const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 5)}.${file.name.split('.').pop()}`;
                    const { error } = await _sup.storage.from('uploads').upload(fileName, file);
                    if (error) throw error;
                    const { data: { publicUrl } } = _sup.storage.from('uploads').getPublicUrl(fileName);
                    uploadedUrls.push(publicUrl);
                }
                await _sup.from('messages').insert([{ text, author_email: myEmail, receiver_email: currentPeer, file_url: uploadedUrls, sender_id: myId }]);
                cancelFile();
            } catch (err) { alert(err.message); }
            finally { btn.innerText = "ОТПРАВИТЬ"; btn.disabled = false; }
        };

        init();
    </script>
</body>
</html>
